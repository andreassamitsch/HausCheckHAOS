name: HausCheck Peisser Support Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/peisser_support.py"
      - "hauscheck/app/peisser_support_fix.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-peisser-support-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Validate live Peisser integration
        id: test
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-peisser-support
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-peisser-support python - <<'PY' > /tmp/hauscheck-peisser-support.log 2>&1
          import asyncio
          import json
          from pathlib import Path

          import httpx
          from PIL import Image
          from io import BytesIO
          from fastapi.testclient import TestClient

          import app.bootstrap
          import app.candidate_preimport_dedupe as pre_dedupe
          import app.github_auto_export as github_export
          import app.gmail_exchange as gmail_exchange
          import app.immoscout_support as support
          import app.main as main
          import app.peisser_support as peisser
          import app.search_automation as automation
          from app.storage import (
              add_media,
              create_house,
              create_search_profile,
              list_houses,
              list_search_candidates,
              list_sources,
              project_dir,
          )

          async def live_checks():
              headers = peisser.BROWSER_HEADERS
              page_sets = []
              sold_total = 0
              async with httpx.AsyncClient(timeout=45, follow_redirects=True, headers=headers) as client:
                  for page in range(1, 6):
                      url = f"{peisser.PEISSER_BASE}index.php?page={page}&view=index&mode=entry&lang=de"
                      response = await client.get(url)
                      response.raise_for_status()
                      cards = peisser.parse_peisser_overview(response.text, str(response.url))
                      page_sets.append(tuple(sorted(card['entry_id'] for card in cards)))
                      sold_total += sum(1 for card in cards if card['sold'])
                      print(f"page_{page}_cards={len(cards)} sold={sum(1 for card in cards if card['sold'])}")
              assert all(page_sets[index] for index in range(4)), page_sets
              assert page_sets[4] == page_sets[3], page_sets
              assert sold_total > 0, "VERKAUFT-Titel wurden nicht erkannt"
              print("pagination_and_sold_detection=ok")

              bundle = await peisser._fetch_peisser_bundle(f"{peisser.PEISSER_BASE}expose.php?id=229")
              parsed = main.parse_listing(f"{peisser.PEISSER_BASE}expose.php?id=229", bundle)
              print(json.dumps({
                  'external_id': parsed.external_id,
                  'title': parsed.title,
                  'price': parsed.price_eur,
                  'living': parsed.living_area_m2,
                  'plot': parsed.plot_area_m2,
                  'rooms': parsed.rooms,
                  'location': parsed.location_text,
                  'hwb': parsed.energy_hwb,
                  'fgee': parsed.energy_fgee,
                  'images': len(parsed.image_urls),
              }, ensure_ascii=False))
              assert parsed.source_name == peisser.PEISSER_SOURCE
              assert parsed.external_id == "09875632", parsed.external_id
              assert parsed.price_eur == 195000, parsed.price_eur
              assert parsed.living_area_m2 == 130, parsed.living_area_m2
              assert parsed.plot_area_m2 == 10893, parsed.plot_area_m2
              assert parsed.rooms == 9, parsed.rooms
              assert parsed.energy_hwb == 73, parsed.energy_hwb
              assert abs(float(parsed.energy_fgee or 0) - 0.86) < 0.001, parsed.energy_fgee
              assert len(parsed.image_urls) >= 15, parsed.image_urls
              assert all('/data/229/img_' in url for url in parsed.image_urls)
              print("detail_text_gallery_parser=ok")

              async with httpx.AsyncClient(timeout=45, follow_redirects=True, headers={**headers, 'Referer': peisser.PEISSER_BASE}) as client:
                  image_response = await client.get(parsed.image_urls[0])
                  image_response.raise_for_status()
              image = Image.open(BytesIO(image_response.content))
              assert image.width >= 800 and image.height >= 500, image.size
              print(f"full_gallery_image={image.width}x{image.height}")

              existing = create_house({
                  'title': parsed.title,
                  'location_text': parsed.location_text,
                  'address_status': parsed.address_status,
                  'price_eur': parsed.price_eur,
                  'living_area_m2': parsed.living_area_m2,
                  'plot_area_m2': parsed.plot_area_m2,
                  'rooms': parsed.rooms,
                  'energy_hwb': parsed.energy_hwb,
                  'energy_fgee': parsed.energy_fgee,
              })
              house_id = str(existing['id'])
              image_path = project_dir(house_id) / 'images' / 'known.jpg'
              image_path.write_bytes(image_response.content)
              add_media(house_id, {
                  'kind': 'image',
                  'original_url': 'https://existing.example/known.jpg',
                  'local_path': str(image_path),
                  'mime_type': image_response.headers.get('content-type') or 'image/jpeg',
                  'download_status': 'downloaded',
                  'content_hash': main.media_hash(image_response.content),
                  'width': image.width,
                  'height': image.height,
                  'file_size_bytes': len(image_response.content),
              })

              profile = create_search_profile({
                  'name': 'Peisser Live Test',
                  'source_name': peisser.PEISSER_SOURCE,
                  'search_url': peisser.PEISSER_SEARCH_URL,
                  'max_price_eur': 420000,
                  'soft_max_price_eur': 390000,
                  'min_living_area_m2': 120,
                  'min_plot_area_m2': 700,
                  'regions': 'Bad Schwanberg',
                  'exclude_roads': 'B76,B69',
                  'hwb_warn': 200,
                  'hwb_reject': 300,
                  'oil_policy': 'review',
              })
              profile_id = str(profile['id'])
              automation.update_profile_automation(profile_id, {
                  'area_ids': '8541',
                  'automation_mode': 'review',
                  'max_results': 10,
                  'enabled': 1,
              })

              exports = []
              async def fake_export(hid):
                  exports.append(str(hid))
                  return {'ok': True}
              async def fake_gmail(hid):
                  return {'ok': True}
              github_export.auto_export_house_to_github = fake_export
              pre_dedupe.github_auto_export.auto_export_house_to_github = fake_export
              gmail_exchange.send_analysis_zip_via_gmail = fake_gmail
              pre_dedupe.gmail_exchange.send_analysis_zip_via_gmail = fake_gmail

              found = await automation.run_search_profile(profile_id, 10)
              candidates = list_search_candidates(profile_id)
              matching = [item for item in candidates if 'expose.php?id=229' in str(item.get('source_url') or '')]
              assert found >= 1, found
              assert matching, candidates
              assert matching[0]['status'] == 'imported', matching[0]
              assert matching[0]['imported_house_id'] == house_id, matching[0]
              assert len(list_houses()) == 1, list_houses()
              assert any(source.get('source_name') == peisser.PEISSER_SOURCE for source in list_sources(house_id))
              assert all('VERKAUFT' not in str(item.get('title') or '').upper() for item in candidates)
              assert exports == [house_id], exports
              print("preimport_cross_portal_dedupe=ok")

              await automation.run_search_profile(profile_id, 10)
              assert exports == [house_id], exports
              print("unchanged_rerun_no_reanalysis=ok")

          with TestClient(app.bootstrap.app) as client:
              form = client.get('/settings/search/new')
              assert form.status_code == 200
              assert 'Peisser Immobilien' in form.text
              assert 'Seiten 1 bis 10' in form.text
              print('peisser_profile_ui=ok')

          asyncio.run(live_checks())
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/hauscheck-peisser-support.log
          exit "$CODE"
      - name: Publish result
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.test.outputs.status }}
          TEST_CODE: ${{ steps.test.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          path=Path('/tmp/hauscheck-peisser-support.log')
          log=path.read_text(encoding='utf-8',errors='replace') if path.exists() else ''
          Path('ci/latest_peisser_support_check.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': log[-10000:],
          },ensure_ascii=False,indent=2),encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_peisser_support_check.json
          git commit -m "Update Peisser support check [skip ci]" || true
          git push || true
