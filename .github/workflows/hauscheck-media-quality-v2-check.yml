name: HausCheck Media Quality V2 Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/media_quality_v2.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-media-quality-v2-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pillow
      - name: Run media regression checks
        id: check
        shell: bash
        env:
          HAUSCHECK_DATA_DIR: /tmp/hauscheck-media-v2
          HAUSCHECK_GITHUB_EXCHANGE_ENABLED: "false"
          HAUSCHECK_GMAIL_EXCHANGE_ENABLED: "false"
        run: |
          set +e
          rm -rf /tmp/hauscheck-media-v2
          mkdir -p /tmp/hauscheck-media-v2
          cd hauscheck
          python - <<'PY' > /tmp/media-v2.log 2>&1
          import io
          import json
          import zipfile
          from pathlib import Path
          from types import SimpleNamespace

          from PIL import Image, ImageDraw

          import app.bootstrap
          import app.analysis_package as analysis_package
          import app.immoscout_support as support
          import app.media_quality_v2 as quality
          import app.modern_ui as modern_ui
          import app.storage as storage
          from app.storage import create_house, create_source, list_media, project_dir, update_media

          house = create_house({
              'title': 'Medien Qualitätstest',
              'location_text': '8551 Wies',
              'price_eur': 320000,
              'living_area_m2': 160,
              'plot_area_m2': 1200,
          })
          house_id = str(house['id'])
          source_a = create_source(house_id, {
              'source_name': 'willhaben.at', 'source_url': 'https://example.test/a',
              'external_id': 'a', 'parser_status': 'success', 'parser_warnings': [],
          })
          source_b = create_source(house_id, {
              'source_name': 'peisser-immobilien.at', 'source_url': 'https://example.test/b',
              'external_id': 'b', 'parser_status': 'success', 'parser_warnings': [],
          })
          image_dir = project_dir(house_id) / 'images'

          def scene(seed, size=(900, 650), crop=False):
              image = Image.new('RGB', size, (35 + seed * 13 % 170, 55 + seed * 17 % 150, 75 + seed * 19 % 130))
              draw = ImageDraw.Draw(image)
              draw.rectangle((80, 170, size[0] - 90, size[1] - 80), fill=(180, 165, 140), outline=(20, 20, 20), width=8)
              draw.polygon([(60, 180), (size[0] // 2, 35 + seed % 40), (size[0] - 60, 180)], fill=(100, 45 + seed, 45), outline=(15, 15, 15))
              draw.rectangle((150 + seed * 3 % 120, 270, 310 + seed * 3 % 120, 500), fill=(70, 40, 25))
              for index in range(3):
                  x = 400 + index * 130
                  draw.rectangle((x, 250, x + 85, 350), fill=(95 + seed, 150, 190), outline=(20, 20, 20), width=5)
              draw.text((20, 20), f'Szene {seed}', fill='white')
              if crop:
                  image = image.crop((35, 25, size[0] - 25, size[1] - 20)).resize(size)
              return image

          def save_image(name, image, quality_value=92):
              path = image_dir / name
              image.save(path, format='JPEG', quality=quality_value, optimize=True)
              return path

          def add_downloaded(source, order, url, path):
              media = storage.add_media(house_id, {
                  'source_id': source['id'], 'kind': 'image', 'original_url': url,
                  'download_status': 'pending', 'source_order': order,
              })
              with Image.open(path) as opened:
                  width, height = opened.size
              update_media(str(media['id']), {
                  'local_path': str(path), 'mime_type': 'image/jpeg', 'download_status': 'downloaded',
                  'file_size_bytes': path.stat().st_size, 'width': width, 'height': height,
              })
              return str(media['id'])

          a_urls = []
          a_ids = []
          for index in range(4):
              url = f'https://portal-a.test/img{index}.jpg'
              path = save_image(f'a_{index}.jpg', scene(index + 1))
              a_urls.append(url)
              a_ids.append(add_downloaded(source_a, index, url, path))

          # Anbieter B liefert zwei inhaltlich gleiche Bilder anders komprimiert/beschnitten
          b_duplicate_1 = save_image('b_duplicate_1.jpg', scene(1, size=(1350, 975)), 70)
          b_duplicate_2 = save_image('b_duplicate_2.jpg', scene(3, crop=True), 78)
          b_unique = save_image('b_unique.jpg', scene(20), 88)
          duplicate_paths = [b_duplicate_1, b_duplicate_2]
          add_downloaded(source_b, 0, 'https://portal-b.test/recompressed.jpg', b_duplicate_1)
          add_downloaded(source_b, 1, 'https://portal-b.test/cropped.jpg', b_duplicate_2)
          unique_b_id = add_downloaded(source_b, 2, 'https://portal-b.test/unique.jpg', b_unique)

          before = len([item for item in list_media(house_id) if item.get('kind') == 'image'])
          result = quality.cleanup_house_media(house_id)
          after_items = quality.ordered_image_items(house_id)
          after = len(after_items)
          print('cleanup=' + json.dumps(result, ensure_ascii=False))
          print('ordered_urls=' + json.dumps([item.get('original_url') for item in after_items]))
          assert before == 7, before
          assert after == 5, after_items
          assert result['removed'] == 2, result
          assert sum(path.exists() for path in duplicate_paths) <= 1
          assert [item.get('original_url') for item in after_items[:4]] == a_urls
          assert str(after_items[-1]['id']) == unique_b_id
          print('cross_provider_physical_dedupe=ok')
          print('primary_portal_order=ok')

          # Eine spätere Portalaktualisierung ändert die Reihenfolge: sie muss übernommen werden.
          support._queue_media(house_id, str(source_a['id']), SimpleNamespace(image_urls=list(reversed(a_urls)), pdf_urls=[]))
          quality.cleanup_house_media(house_id)
          reordered = quality.ordered_image_items(house_id)
          reordered_a = [item.get('original_url') for item in reordered if item.get('original_url') in a_urls]
          assert reordered_a == list(reversed(a_urls)), reordered_a
          assert modern_ui._house_images(house_id)[0]['original_url'] == a_urls[-1]
          print('portal_reorder_refresh=ok')

          # Mehr als zwölf eindeutige Bilder, die späten Bilder simulieren Innenräume.
          for index in range(24):
              url = f'https://portal-a.test/extra-{index:02d}.jpg'
              path = save_image(f'extra_{index:02d}.jpg', scene(40 + index), 84)
              add_downloaded(source_a, 10 + index, url, path)
          quality.cleanup_house_media(house_id)
          ordered = quality.ordered_image_items(house_id)
          assert len(ordered) >= 25, len(ordered)

          zip_path = analysis_package.create_analysis_zip(house_id)
          with zipfile.ZipFile(zip_path) as archive:
              image_names = sorted(name for name in archive.namelist() if name.startswith('images/') and name.endswith('.jpg'))
              selection = json.loads(archive.read('image_selection.json'))
              prompt = archive.read('README_PROMPT.md').decode('utf-8')
              schema = json.loads(archive.read('import_schema.json'))
          print('ai_images=' + str(len(image_names)))
          print('selection=' + json.dumps({k: selection.get(k) for k in ('selection_mode','total_unique_images','exported_images','omitted_images')}, ensure_ascii=False))
          assert len(image_names) > 12, image_names
          assert len(image_names) == selection['exported_images']
          assert selection['images'][-1]['display_order'] == max(item.get('display_order') for item in ordered)
          assert 'Prüfe **jedes** exportierte Bild' in prompt
          assert 'image_coverage' in schema['properties']
          print('late_gallery_images_exported=ok')
          print('balanced_ai_prompt_and_manifest=ok')
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/media-v2.log
          exit "$CODE"
      - name: Publish result
        if: always()
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          log = Path('/tmp/media-v2.log').read_text(encoding='utf-8', errors='replace') if Path('/tmp/media-v2.log').exists() else ''
          Path('ci').mkdir(exist_ok=True)
          Path('ci/latest_media_quality_v2_check.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ.get('GITHUB_SHA'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'status': '${{ steps.check.outputs.status }}',
              'test_code': int('${{ steps.check.outputs.code }}' or 1),
              'log_tail': log[-12000:],
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_media_quality_v2_check.json
          git commit -m "Update media quality v2 check [skip ci]" || true
          git pull --rebase || true
          git push || true
