name: HausCheck ImmobilienScout Full Run Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/immoscout_url_runtime_fix.py"
      - "hauscheck/app/immoscout_dynamic_search.py"
      - "hauscheck/app/immoscout_dynamic_mode.py"
      - "hauscheck/app/immoscout_numeric_fix.py"
      - "hauscheck/app/immoscout_support.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-immoscout-full-run-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Run complete ImmobilienScout profile through HausCheck
        id: full_run
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-immoscout-full-run
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-immoscout-full-run python - <<'PY' > /tmp/hauscheck-immoscout-full-run.log 2>&1
          from bs4 import BeautifulSoup
          from fastapi.testclient import TestClient

          import app.bootstrap
          import app.main as main
          from app.storage import get_search_profile, list_search_candidates, list_search_profiles

          expected_first = "https://www.immobilienscout24.at/regional/8551/haus-kaufen?plotAreaFrom=700&primaryAreaFrom=120&primaryPriceTo=420000"
          expected_8523 = "https://www.immobilienscout24.at/regional/8523/haus-kaufen?plotAreaFrom=700&primaryAreaFrom=120&primaryPriceTo=420000"

          with TestClient(app.bootstrap.app) as client:
              response = client.post(
                  "/settings/search/profiles",
                  data={
                      "name": "ImmoScout kompletter App-Lauf",
                      "source_name": "immobilienscout24.at",
                      "regions": "Wies, Eibiswald, Oberhaag, Bad Schwanberg",
                      "area_ids": "8551,8552,8544,8553,8523",
                      "search_url": "",
                      "max_price_eur": "420000",
                      "soft_max_price_eur": "390000",
                      "min_living_area_m2": "120",
                      "min_plot_area_m2": "700",
                      "exclude_roads": "B76,B69,Bundesstraße,Hauptstraße",
                      "hwb_warn": "200",
                      "hwb_reject": "300",
                      "oil_policy": "review",
                      "automation_mode": "review",
                      "run_interval_minutes": "60",
                      "max_results": "10",
                      "auto_import_min_score": "68",
                      "auto_import_limit_per_run": "2",
                  },
                  follow_redirects=False,
              )
              assert response.status_code == 303, response.text
              profile = next(item for item in list_search_profiles() if item["name"] == "ImmoScout kompletter App-Lauf")
              profile_id = str(profile["id"])

              urls = main.resolve_search_urls(profile)
              assert len(urls) == 5, urls
              assert expected_first == urls[0], urls
              assert expected_8523 in urls, urls
              assert all(".0" not in url for url in urls), urls
              assert all("plotAreaFrom=700" in url and "primaryAreaFrom=120" in url for url in urls), urls
              print("runtime_urls_are_integer=ok")

              edit = client.get(f"/settings/search/{profile_id}/edit")
              assert edit.status_code == 200, edit.text
              soup = BeautifulSoup(edit.text, "html.parser")
              assert soup.select_one('input[name="min_plot_area_m2"]')["value"] == "700"
              assert soup.select_one('input[name="min_living_area_m2"]')["value"] == "120"
              assert soup.select_one('input[name="max_price_eur"]')["value"] == "420000"
              assert "const whole =" in edit.text
              assert "plotAreaFrom=700.0" not in edit.text
              assert "primaryAreaFrom=120.0" not in edit.text
              print("visible_preview_is_integer=ok")

              run = client.post(f"/search/profiles/{profile_id}/run", follow_redirects=False)
              assert run.status_code == 303, run.text
              refreshed = get_search_profile(profile_id)
              candidates = list_search_candidates(profile_id)
              print(f"last_run_status={refreshed.get('last_run_status')}")
              print(f"last_found_count={refreshed.get('last_found_count')}")
              print(f"stored_candidates={len(candidates)}")
              assert int(refreshed.get("last_found_count") or 0) > 0, refreshed
              assert candidates, refreshed
              assert any("immobilienscout24.at/expose/" in str(item.get("source_url") or "") for item in candidates), candidates
              print("full_app_profile_run=ok")
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/hauscheck-immoscout-full-run.log
          exit "$CODE"
      - name: Publish result
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.full_run.outputs.status }}
          TEST_CODE: ${{ steps.full_run.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          path = Path('/tmp/hauscheck-immoscout-full-run.log')
          log = path.read_text(encoding='utf-8', errors='replace') if path.exists() else ''
          Path('ci/latest_immoscout_full_run_check.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': log[-8000:],
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_immoscout_full_run_check.json
          git commit -m "Update ImmobilienScout full run check [skip ci]" || true
          git push || true
