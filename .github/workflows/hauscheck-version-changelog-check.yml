name: HausCheck Version Changelog Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/config.yaml"
      - "hauscheck/CHANGELOG.md"
      - ".github/workflows/hauscheck-version-changelog-check.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare add-on and changelog versions
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          config = Path("hauscheck/config.yaml").read_text(encoding="utf-8")
          changelog = Path("hauscheck/CHANGELOG.md").read_text(encoding="utf-8")

          config_match = re.search(r'^version:\s*["\']?([^"\'\s]+)', config, re.MULTILINE)
          changelog_match = re.search(r'^##\s+([0-9]+\.[0-9]+\.[0-9]+)\s*$', changelog, re.MULTILINE)
          if not config_match:
              raise SystemExit("Keine Version in hauscheck/config.yaml gefunden")
          if not changelog_match:
              raise SystemExit("Kein Versionsabschnitt in hauscheck/CHANGELOG.md gefunden")

          config_version = config_match.group(1)
          changelog_version = changelog_match.group(1)
          print(f"config.yaml: {config_version}")
          print(f"CHANGELOG.md: {changelog_version}")
          if config_version != changelog_version:
              raise SystemExit(
                  f"Versionsfehler: config.yaml={config_version}, erster Changelog-Eintrag={changelog_version}"
              )
          print("version_and_changelog_match=ok")
          PY
