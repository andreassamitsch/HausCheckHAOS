name: HausCheck ImmobilienScout Dynamic URL Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/immoscout_dynamic_search.py"
      - "hauscheck/app/immoscout_dynamic_mode.py"
      - "hauscheck/app/immoscout_support.py"
      - "hauscheck/app/bootstrap.py"
      - "hauscheck/config.yaml"
      - ".github/workflows/hauscheck-immoscout-dynamic-url-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Test generated portal URLs and profile editing
        id: dynamic_url_check
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-immoscout-dynamic-url-test
          mkdir -p /tmp/hauscheck-immoscout-dynamic-url-test
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-immoscout-dynamic-url-test python - <<'PY' > /tmp/hauscheck-immoscout-dynamic-url-check.log 2>&1
          import httpx
          from bs4 import BeautifulSoup
          from fastapi.testclient import TestClient

          import app.bootstrap
          import app.main as main
          from app.immoscout_dynamic_search import build_immoscout_auto_urls, build_immoscout_url_for_area
          from app.parser import extract_listing_candidates
          from app.storage import connect, get_search_profile, list_search_profiles

          expected = "https://www.immobilienscout24.at/regional/8551/haus-kaufen?plotAreaFrom=700&primaryAreaFrom=120&primaryPriceTo=420000"
          generated = build_immoscout_url_for_area({
              "max_price_eur": 420000,
              "min_living_area_m2": 120,
              "min_plot_area_m2": 700,
          }, "8551")
          assert generated == expected, generated
          assert build_immoscout_auto_urls({
              "max_price_eur": 420000,
              "min_living_area_m2": 120,
              "min_plot_area_m2": 700,
          }, "8551,8552") == [expected, expected.replace("/8551/", "/8552/")]
          print("exact_immoscout_url_generation=ok")

          with TestClient(app.bootstrap.app) as client:
              new_page = client.get("/settings/search/new")
              assert new_page.status_code == 200, new_page.text
              assert "ImmobilienScout24 Österreich" in new_page.text
              assert "PLZ / Suchgebiete" in new_page.text
              assert "Leer lassen = URL wird automatisch" in new_page.text
              print("dynamic_profile_form=ok")

              created = client.post(
                  "/settings/search/profiles",
                  data={
                      "name": "ImmoScout dynamisch",
                      "source_name": "immobilienscout24.at",
                      "regions": "Wies, Eibiswald",
                      "area_ids": "8551,8552",
                      "search_url": "",
                      "max_price_eur": "420000",
                      "soft_max_price_eur": "390000",
                      "min_living_area_m2": "120",
                      "min_plot_area_m2": "700",
                      "exclude_roads": "B76,B69",
                      "hwb_warn": "200",
                      "hwb_reject": "300",
                      "oil_policy": "review",
                      "automation_mode": "review",
                      "run_interval_minutes": "60",
                      "max_results": "80",
                      "auto_import_min_score": "68",
                      "auto_import_limit_per_run": "2",
                  },
                  follow_redirects=False,
              )
              assert created.status_code == 303, created.text
              profile = next(item for item in list_search_profiles() if item["name"] == "ImmoScout dynamisch")
              profile_id = str(profile["id"])
              assert profile["source_name"] == "immobilienscout24.at", profile
              assert profile["search_url_mode"] == "automatic", profile
              assert profile["search_url"].splitlines() == [expected, expected.replace("/8551/", "/8552/")], profile
              assert main.resolve_search_urls(profile) == [expected, expected.replace("/8551/", "/8552/")]
              print("automatic_profile_creation=ok")

              edit_page = client.get(f"/settings/search/{profile_id}/edit")
              assert edit_page.status_code == 200, edit_page.text
              soup = BeautifulSoup(edit_page.text, "html.parser")
              source = soup.select_one('select[name="source_name"]')
              custom = soup.select_one('textarea[name="search_url"]')
              assert source and source.select_one('option[value="immobilienscout24.at"][selected]')
              assert custom and not custom.get_text(strip=True)
              print("automatic_url_hidden_from_custom_field=ok")

              edited = client.post(
                  f"/settings/search/{profile_id}/edit",
                  data={
                      "name": "ImmoScout dynamisch geändert",
                      "source_name": "immobilienscout24.at",
                      "regions": "Oberhaag",
                      "area_ids": "8544",
                      "search_url": "",
                      "max_price_eur": "410000",
                      "soft_max_price_eur": "380000",
                      "min_living_area_m2": "130",
                      "min_plot_area_m2": "900",
                      "exclude_roads": "B69",
                      "hwb_warn": "180",
                      "hwb_reject": "280",
                      "oil_policy": "reject",
                      "enabled": "1",
                      "automation_mode": "review",
                      "run_interval_minutes": "45",
                      "max_results": "70",
                      "auto_import_min_score": "72",
                      "auto_import_limit_per_run": "3",
                  },
                  follow_redirects=False,
              )
              assert edited.status_code == 303, edited.text
              profile = get_search_profile(profile_id)
              updated_url = "https://www.immobilienscout24.at/regional/8544/haus-kaufen?plotAreaFrom=900&primaryAreaFrom=130&primaryPriceTo=410000"
              assert profile["search_url"] == updated_url, profile
              assert profile["search_url_mode"] == "automatic", profile
              print("filter_edit_regenerates_url=ok")

              with connect() as con:
                  con.execute("UPDATE search_profiles SET max_price_eur = 405000 WHERE id = ?", (profile_id,))
                  con.commit()
              profile = get_search_profile(profile_id)
              runtime_url = main.resolve_search_urls(profile)[0]
              assert runtime_url.endswith("primaryPriceTo=405000"), runtime_url
              print("runtime_url_uses_current_filters=ok")

              custom_url = "https://www.immobilienscout24.at/regional/8551/haus-kaufen?plotAreaFrom=777&primaryAreaFrom=133&primaryPriceTo=399999&foo=bar"
              custom_saved = client.post(
                  f"/settings/search/{profile_id}/edit",
                  data={
                      "name": "ImmoScout Spezial",
                      "source_name": "immobilienscout24.at",
                      "regions": "Wies",
                      "area_ids": "8551",
                      "search_url": custom_url,
                      "max_price_eur": "420000",
                      "soft_max_price_eur": "390000",
                      "min_living_area_m2": "120",
                      "min_plot_area_m2": "700",
                      "exclude_roads": "B76",
                      "hwb_warn": "200",
                      "hwb_reject": "300",
                      "oil_policy": "review",
                      "enabled": "1",
                      "automation_mode": "manual",
                      "run_interval_minutes": "60",
                      "max_results": "80",
                      "auto_import_min_score": "68",
                      "auto_import_limit_per_run": "2",
                  },
                  follow_redirects=False,
              )
              assert custom_saved.status_code == 303, custom_saved.text
              profile = get_search_profile(profile_id)
              assert profile["search_url_mode"] == "custom", profile
              assert main.resolve_search_urls(profile) == [custom_url], profile
              print("custom_url_remains_untouched=ok")

          response = httpx.get(
              expected,
              follow_redirects=True,
              timeout=45,
              headers={
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36",
                  "Accept-Language": "de-AT,de;q=0.9",
              },
          )
          assert response.status_code == 200, response.status_code
          candidates = extract_listing_candidates(response.text, str(response.url))
          assert candidates, "Keine ImmobilienScout-Treffer in der live erzeugten Such-URL erkannt"
          print(f"live_generated_search=ok candidates={len(candidates)}")
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/hauscheck-immoscout-dynamic-url-check.log
          exit "$CODE"
      - name: Publish dynamic URL result
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.dynamic_url_check.outputs.status }}
          TEST_CODE: ${{ steps.dynamic_url_check.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log_path = Path('/tmp/hauscheck-immoscout-dynamic-url-check.log')
          log = log_path.read_text(encoding='utf-8', errors='replace') if log_path.exists() else ''
          result = {
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': log[-6000:],
          }
          Path('ci/latest_immoscout_dynamic_url_check.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_immoscout_dynamic_url_check.json
          git commit -m "Update ImmobilienScout dynamic URL check [skip ci]" || true
          git push || true
