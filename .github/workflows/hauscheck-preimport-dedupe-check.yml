name: HausCheck Pre-Import Dedupe Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/candidate_preimport_dedupe.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-preimport-dedupe-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Validate pre-import deduplication and refresh
        id: test
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-preimport-dedupe
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-preimport-dedupe python - <<'PY' > /tmp/hauscheck-preimport-dedupe.log 2>&1
          import asyncio

          import app.bootstrap
          import app.candidate_preimport_dedupe as pre
          import app.github_auto_export as github_auto_export
          import app.gmail_exchange as gmail_exchange
          import app.main as main
          from app.parser import ParsedListing
          from app.storage import (
              create_house,
              create_search_profile,
              create_source,
              get_house,
              list_houses,
              list_search_candidates,
              list_sources,
              update_search_profile_run,
              upsert_search_candidate,
          )

          profile = create_search_profile({
              "name": "Dedupe vor Import",
              "source_name": "immobilienscout24.at",
              "search_url": "https://www.immobilienscout24.at/regional/8523/haus-kaufen?plotAreaFrom=700&primaryAreaFrom=120&primaryPriceTo=420000",
              "max_price_eur": 420000,
              "soft_max_price_eur": 390000,
              "min_living_area_m2": 120,
              "min_plot_area_m2": 700,
              "regions": "St. Oswald ob Eibiswald",
              "hwb_warn": 200,
              "hwb_reject": 300,
              "oil_policy": "review",
          })
          profile_id = str(profile["id"])

          house = create_house({
              "title": "Familienhaus in ruhiger Lage",
              "location_text": "Dorfstraße 7, 8523 St. Oswald ob Eibiswald",
              "address_status": "exact",
              "price_eur": 350000,
              "living_area_m2": 145,
              "plot_area_m2": 1100,
              "rooms": 5,
              "year_built": 1985,
              "heating": "Gas",
              "energy_hwb": 180,
          })
          house_id = str(house["id"])
          create_source(house_id, {
              "source_name": "willhaben.at",
              "source_url": "https://www.willhaben.at/iad/immobilien/d/haus-kaufen/testhaus-1234567890",
              "external_id": "1234567890",
              "description": "Bestehendes Willhaben-Inserat",
              "parser_status": "success",
              "parser_warnings": [],
          })

          current = {
              "parsed": ParsedListing(
                  source_name="immobilienscout24.at",
                  source_url="https://www.immobilienscout24.at/expose/aaaaaaaaaaaaaaaaaaaaaaaa",
                  external_id="aaaaaaaaaaaaaaaaaaaaaaaa",
                  title="Familienhaus in ruhiger Lage",
                  description="Neue Maklerbeschreibung mit zusätzlicher Information.",
                  price_eur=345000,
                  living_area_m2=145,
                  plot_area_m2=1100,
                  rooms=5,
                  location_text="Dorfstraße 7, 8523 St. Oswald ob Eibiswald",
                  address_status="exact",
                  year_built=1985,
                  heating="Gas",
                  energy_hwb=180,
                  evidence=[{
                      "field_name": "energy_hwb",
                      "value": 180,
                      "source_label": "ImmobilienScout HWB",
                      "source_text_snippet": "HWB 180",
                      "confidence": "verified",
                  }],
              )
          }

          async def fake_base_run(pid: str, max_results: int = 80) -> int:
              parsed = current["parsed"]
              upsert_search_candidate(
                  pid,
                  parsed.source_url,
                  parsed.title,
                  status="new",
                  facts=main.facts_from_parsed(parsed),
                  filter_reasons=["Basislauf hielt Treffer zunächst für neu"],
              )
              update_search_profile_run(pid, 1)
              return 1

          async def fake_fetch(url: str) -> str:
              return "<html><body>synthetic detail</body></html>"

          def fake_parse(url: str, html: str):
              return current["parsed"]

          async def no_media(house_id: str, limit: int = 120):
              return None

          exports = []
          async def fake_export(hid: str):
              exports.append(hid)
              return True

          async def fake_gmail(hid: str):
              return False

          pre._ORIGINAL_RUN_SEARCH = fake_base_run
          main.fetch_html = fake_fetch
          main.parse_listing = fake_parse
          main.download_pending_media_files = no_media
          github_auto_export.auto_export_house_to_github = fake_export
          gmail_exchange.send_analysis_zip_via_gmail = fake_gmail

          asyncio.run(pre.run_search_with_preimport_dedupe(profile_id, 20))
          candidates = list_search_candidates(profile_id)
          assert len(list_houses()) == 1, list_houses()
          assert len(list_sources(house_id)) == 2, list_sources(house_id)
          assert len(candidates) == 1, candidates
          assert candidates[0]["status"] == "imported", candidates[0]
          assert candidates[0]["imported_house_id"] == house_id, candidates[0]
          assert candidates[0]["decision"] == "existing_updated", candidates[0]
          assert len(exports) == 1, exports
          assert int(get_house(house_id)["price_eur"]) == 345000, get_house(house_id)
          print("cross_portal_candidate_merged_before_display=ok")

          asyncio.run(pre.run_search_with_preimport_dedupe(profile_id, 20))
          candidates = list_search_candidates(profile_id)
          assert len(list_houses()) == 1
          assert len(list_sources(house_id)) == 2
          assert candidates[0]["status"] == "imported"
          assert candidates[0]["decision"] == "existing_known", candidates[0]
          assert len(exports) == 1, exports
          print("unchanged_known_listing_does_not_reanalyse=ok")

          current["parsed"] = ParsedListing(
              source_name="immobilienscout24.at",
              source_url="https://www.immobilienscout24.at/expose/aaaaaaaaaaaaaaaaaaaaaaaa",
              external_id="aaaaaaaaaaaaaaaaaaaaaaaa",
              title="Familienhaus in ruhiger Lage – Preis reduziert",
              description="Aktualisierte Maklerbeschreibung.",
              price_eur=330000,
              living_area_m2=145,
              plot_area_m2=1100,
              rooms=5,
              location_text="Dorfstraße 7, 8523 St. Oswald ob Eibiswald",
              address_status="exact",
              year_built=1985,
              heating="Gas",
              energy_hwb=175,
              evidence=[
                  {"field_name":"price_eur","value":330000,"source_label":"ImmobilienScout Preis","source_text_snippet":"330.000 €","confidence":"verified"},
                  {"field_name":"energy_hwb","value":175,"source_label":"ImmobilienScout HWB","source_text_snippet":"HWB 175","confidence":"verified"},
              ],
          )
          asyncio.run(pre.run_search_with_preimport_dedupe(profile_id, 20))
          candidates = list_search_candidates(profile_id)
          assert candidates[0]["decision"] == "existing_updated", candidates[0]
          assert int(get_house(house_id)["price_eur"]) == 330000, get_house(house_id)
          assert len(exports) == 2, exports
          print("changed_known_listing_updates_and_reanalyses=ok")

          current["parsed"] = ParsedListing(
              source_name="immobilienscout24.at",
              source_url="https://www.immobilienscout24.at/expose/bbbbbbbbbbbbbbbbbbbbbbbb",
              external_id="bbbbbbbbbbbbbbbbbbbbbbbb",
              title="Anderes Haus in Deutschlandsberg",
              description="Eindeutig anderes Objekt",
              price_eur=390000,
              living_area_m2=180,
              plot_area_m2=800,
              rooms=7,
              location_text="8530 Deutschlandsberg",
              address_status="municipality_only",
              year_built=2005,
              heating="Wärmepumpe",
              energy_hwb=55,
          )
          asyncio.run(pre.run_search_with_preimport_dedupe(profile_id, 20))
          candidates = list_search_candidates(profile_id)
          other = next(item for item in candidates if "bbbb" in item["source_url"])
          assert other["status"] == "new", other
          assert other["imported_house_id"] is None, other
          assert len(list_houses()) == 1
          assert len(exports) == 2
          print("unrelated_house_remains_new=ok")
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/hauscheck-preimport-dedupe.log
          exit "$CODE"
      - name: Publish result
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.test.outputs.status }}
          TEST_CODE: ${{ steps.test.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          path = Path('/tmp/hauscheck-preimport-dedupe.log')
          log = path.read_text(encoding='utf-8', errors='replace') if path.exists() else ''
          Path('ci/latest_preimport_dedupe_check.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': log[-8000:],
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_preimport_dedupe_check.json
          git commit -m "Update pre-import dedupe check [skip ci]" || true
          git push || true
