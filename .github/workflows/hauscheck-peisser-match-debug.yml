name: HausCheck Peisser Match Debug

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/peisser_runtime_repair.py"
      - ".github/workflows/hauscheck-peisser-match-debug.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: hauscheck
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pillow
      - name: Compare real Peisser object with existing Wies house
        id: check
        env:
          HAUSCHECK_DATA_DIR: /tmp/hauscheck-peisser-match
          HAUSCHECK_GITHUB_EXCHANGE_ENABLED: "false"
          HAUSCHECK_GMAIL_EXCHANGE_ENABLED: "false"
        run: |
          set +e
          rm -rf /tmp/hauscheck-peisser-match
          mkdir -p /tmp/hauscheck-peisser-match
          cd hauscheck
          python - <<'PY' > /tmp/peisser-match.log 2>&1
          import asyncio, json
          import app.bootstrap
          import app.main as main
          import app.immoscout_support as support
          import app.peisser_runtime_repair as repair
          from app.storage import create_house

          house = create_house({
              'title': 'Gute Aussichten – Wohnen, Hobby, Arbeit und Freizeit',
              'location_text': '8551 Wies',
              'address_status': 'municipality_only',
              'price_eur': 320000,
              'living_area_m2': 275,
              'plot_area_m2': 2000,
              'rooms': 6,
              'heating': 'Gasheizung',
              'energy_hwb': 352,
              'energy_fgee': 4.04,
          })

          async def run():
              async def no_hashes(urls, limit=5): return []
              support._remote_image_hashes = no_hashes
              url = 'https://www.peisser-immobilien.at/expose.php?id=149'
              raw = await main.fetch_html(url)
              parsed = main.parse_listing(url, raw)
              print('parsed=' + json.dumps({
                  'source': parsed.source_name, 'title': parsed.title, 'location': parsed.location_text,
                  'price': parsed.price_eur, 'living': parsed.living_area_m2, 'plot': parsed.plot_area_m2,
                  'rooms': parsed.rooms, 'heating': parsed.heating, 'hwb': parsed.energy_hwb,
                  'fgee': parsed.energy_fgee, 'images': len(parsed.image_urls)
              }, ensure_ascii=False))
              score, reasons = repair.structured_match_peisser(house, parsed)
              print('structured=' + json.dumps({'score': score, 'reasons': reasons}, ensure_ascii=False))
              match = await support.find_probable_duplicate(parsed)
              print('match=' + json.dumps({
                  'house': (match[0] or {}).get('id'), 'method': match[1], 'score': match[2], 'details': match[3]
              }, ensure_ascii=False))
              assert match[0] is not None, match
              assert str(match[0]['id']) == str(house['id']), match
              assert match[1] == 'structured_facts', match
              print('real_fact_match=ok')
          asyncio.run(run())
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/peisser-match.log
          exit "$CODE"
      - name: Publish result
        if: always()
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          log = Path('/tmp/peisser-match.log').read_text(encoding='utf-8', errors='replace') if Path('/tmp/peisser-match.log').exists() else ''
          Path('ci').mkdir(exist_ok=True)
          Path('ci/latest_peisser_match_debug.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ.get('GITHUB_SHA'), 'run_id': os.environ.get('GITHUB_RUN_ID'),
              'status': '${{ steps.check.outputs.status }}', 'test_code': int('${{ steps.check.outputs.code }}' or 1),
              'log_tail': log[-8000:]
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_peisser_match_debug.json
          git commit -m "Update Peisser match debug [skip ci]" || true
          git push || true
