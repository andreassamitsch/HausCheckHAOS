name: HausCheck ImmobilienScout Dynamic Debug
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/hauscheck-immoscout-dynamic-debug.yml"
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - shell: bash
        run: |
          rm -rf /tmp/hc-dynamic-debug
          mkdir -p /tmp/hc-dynamic-debug
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hc-dynamic-debug python - <<'PY'
          import json
          from pathlib import Path
          from fastapi.testclient import TestClient
          import app.bootstrap
          import app.main as main
          from app.storage import list_search_profiles
          with TestClient(app.bootstrap.app) as client:
              response = client.post('/settings/search/profiles', data={
                  'name':'debug profile','source_name':'immobilienscout24.at','regions':'Wies',
                  'area_ids':'8551,8552','search_url':'','max_price_eur':'420000',
                  'soft_max_price_eur':'390000','min_living_area_m2':'120','min_plot_area_m2':'700',
                  'exclude_roads':'B76','hwb_warn':'200','hwb_reject':'300','oil_policy':'review',
                  'automation_mode':'review','run_interval_minutes':'60','max_results':'80',
                  'auto_import_min_score':'68','auto_import_limit_per_run':'2'
              }, follow_redirects=False)
              profile = list_search_profiles()[0]
              result = {
                  'status_code': response.status_code,
                  'profile': profile,
                  'runtime_urls': main.resolve_search_urls(profile),
                  'resolver_module': getattr(main.resolve_search_urls, '__module__', None),
                  'resolver_name': getattr(main.resolve_search_urls, '__name__', None),
              }
              Path('../ci').mkdir(exist_ok=True)
              Path('../ci/immoscout_dynamic_debug.json').write_text(json.dumps(result, ensure_ascii=False, indent=2, default=str), encoding='utf-8')
          PY
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/immoscout_dynamic_debug.json
          git commit -m "Update ImmobilienScout dynamic debug [skip ci]" || true
          git push || true
