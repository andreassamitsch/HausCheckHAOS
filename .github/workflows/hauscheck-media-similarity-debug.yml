name: HausCheck Media Similarity Debug

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/hauscheck-media-similarity-debug.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: hauscheck
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pillow
      - name: Print pair metrics
        working-directory: hauscheck
        env:
          HAUSCHECK_DATA_DIR: /tmp/hc-media-sim
        run: |
          python - <<'PY' > /tmp/media-sim.log 2>&1
          import json
          from pathlib import Path
          from PIL import Image, ImageDraw
          import app.media_quality_v2 as q

          root=Path('/tmp/hc-media-sim'); root.mkdir(parents=True,exist_ok=True)
          def scene(seed, size=(900,650)):
              image=Image.new('RGB',size,(35+seed*13%170,55+seed*17%150,75+seed*19%130))
              draw=ImageDraw.Draw(image)
              draw.rectangle((80,170,size[0]-90,size[1]-80),fill=(180,165,140),outline=(20,20,20),width=8)
              draw.polygon([(60,180),(size[0]//2,35+seed%40),(size[0]-60,180)],fill=(100,45+seed,45),outline=(15,15,15))
              draw.rectangle((150+seed*3%120,270,310+seed*3%120,500),fill=(70,40,25))
              for index in range(3):
                  x=400+index*130
                  draw.rectangle((x,250,x+85,350),fill=(95+seed,150,190),outline=(20,20,20),width=5)
              draw.text((20,20),f'Szene {seed}',fill='white')
              return image
          images={f'a{i}':scene(i) for i in range(1,5)}
          images['a1_resize']=images['a1'].resize((1350,975))
          images['a3_crop']=images['a3'].crop((35,25,875,630)).resize((900,650))
          fps={}
          for name,image in images.items():
              path=root/f'{name}.jpg'; image.save(path,'JPEG',quality=70 if 'resize' in name else 78 if 'crop' in name else 92)
              fps[name]=q._fingerprint(path,{})
          names=list(fps)
          for i,left in enumerate(names):
              for right in names[i+1:]:
                  duplicate,method,details=q._visual_duplicate(fps[left],fps[right])
                  print(json.dumps({'left':left,'right':right,'duplicate':duplicate,'method':method,**details},sort_keys=True))
          PY
          cat /tmp/media-sim.log
      - name: Publish debug
        if: always()
        run: |
          mkdir -p ci
          python - <<'PY'
          import json, os
          from pathlib import Path
          Path('ci/latest_media_similarity_debug.json').write_text(json.dumps({'commit':os.environ.get('GITHUB_SHA'),'log':Path('/tmp/media-sim.log').read_text(errors='replace')},indent=2),encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_media_similarity_debug.json
          git commit -m "Update media similarity debug [skip ci]" || true
          git pull --rebase || true
          git push || true
