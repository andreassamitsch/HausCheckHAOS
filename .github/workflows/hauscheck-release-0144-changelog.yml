name: HausCheck 0.14.4 Changelog

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/config.yaml"
      - ".github/workflows/hauscheck-release-0144-changelog.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add release notes
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('hauscheck/CHANGELOG.md')
          text = path.read_text(encoding='utf-8')
          if '\n## 0.14.4\n' not in text:
              section = '''## 0.14.4

- blockierende vollständige Bildbereinigung aus dem Add-on-Start entfernt
- Home-Assistant-Ingress und HTTP-Server werden sofort freigegeben
- bestehende Hausakten werden erst nach dem Start gedrosselt im Hintergrund bereinigt
- jede Hausakte wird in einem separaten Worker-Schritt verarbeitet, damit die Oberfläche erreichbar bleibt
- manueller Bereinigungsbutton und automatische Bereinigung nach neuen Downloads bleiben erhalten
- Starttest mit einer vorbereiteten Galerie aus 70 Bildern ergänzt
- Add-on-Version auf 0.14.4 erhöht

'''
              marker = '# Changelog\n\n'
              if not text.startswith(marker):
                  raise SystemExit('Unerwarteter Changelog-Kopf')
              path.write_text(marker + section + text[len(marker):], encoding='utf-8')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add hauscheck/CHANGELOG.md
          git commit -m "Document HausCheck 0.14.4 [skip ci]" || exit 0
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep $((attempt * 2))
          done
          exit 1
