name: HausCheck Peisser Live Probe

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/hauscheck-peisser-probe.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install probe dependencies
        run: python -m pip install httpx beautifulsoup4
      - name: Probe Peisser pages and expose views
        id: probe
        shell: bash
        run: |
          set +e
          python - <<'PY' > /tmp/hauscheck-peisser-probe.log 2>&1
          import json, re
          from urllib.parse import urljoin, urlsplit, parse_qs
          import httpx
          from bs4 import BeautifulSoup

          BASE = "https://www.peisser-immobilien.at/"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126.0 Safari/537.36",
              "Accept-Language": "de-AT,de;q=0.9,en;q=0.7",
          }

          def clean(text):
              return re.sub(r"\s+", " ", str(text or "")).strip()

          report = {"pages": [], "active_sample": None}
          all_items = []
          seen_page_sets = set()
          with httpx.Client(timeout=45, follow_redirects=True, headers=headers) as client:
              for page in range(1, 11):
                  url = f"{BASE}index.php?page={page}&view=index&mode=entry&lang=de"
                  response = client.get(url)
                  response.raise_for_status()
                  soup = BeautifulSoup(response.text, "html.parser")
                  found = {}
                  for anchor in soup.find_all("a", href=True):
                      href = str(anchor.get("href") or "")
                      absolute = urljoin(str(response.url), href)
                      parts = urlsplit(absolute)
                      if not parts.path.endswith("expose.php"):
                          continue
                      expose_id = (parse_qs(parts.query).get("id") or [None])[0]
                      if not expose_id:
                          continue
                      container = anchor
                      for _ in range(7):
                          parent = getattr(container, "parent", None)
                          if parent is None or getattr(parent, "name", None) in {"body", "html"}:
                              break
                          container = parent
                          text = clean(container.get_text(" ", strip=True))
                          if len(text) >= 35:
                              break
                      text = clean(container.get_text(" ", strip=True))
                      title_node = container.find(["h1", "h2", "h3", "h4", "strong", "b"])
                      title = clean(title_node.get_text(" ", strip=True) if title_node else anchor.get_text(" ", strip=True))
                      if len(title) < 4:
                          title = text[:180]
                      found[str(expose_id)] = {
                          "id": str(expose_id),
                          "url": f"{BASE}expose.php?id={expose_id}",
                          "title": title[:220],
                          "text_sample": text[:360],
                          "sold": bool(re.search(r"\bVERKAUFT\b", text, re.I)),
                      }
                  ids = tuple(sorted(found))
                  duplicate_page = bool(ids and ids in seen_page_sets)
                  if ids:
                      seen_page_sets.add(ids)
                  page_result = {
                      "page": page,
                      "status": response.status_code,
                      "bytes": len(response.content),
                      "count": len(found),
                      "ids": list(ids),
                      "sold_count": sum(1 for item in found.values() if item["sold"]),
                      "duplicate_page": duplicate_page,
                  }
                  report["pages"].append(page_result)
                  print(json.dumps(page_result, ensure_ascii=False))
                  if not found or duplicate_page:
                      break
                  all_items.extend(found.values())

              active = next((item for item in all_items if not item["sold"]), None)
              if active:
                  eid = active["id"]
                  sample = {"overview": active}
                  for view, suffix in (("data", ""), ("texts", "&view=texts"), ("gallery", "&view=gallery")):
                      response = client.get(f"{BASE}expose.php?id={eid}{suffix}")
                      response.raise_for_status()
                      soup = BeautifulSoup(response.text, "html.parser")
                      text = clean(soup.get_text(" ", strip=True))
                      links = [urljoin(str(response.url), str(a.get("href") or "")) for a in soup.find_all("a", href=True)]
                      imgs = []
                      for node in soup.find_all(["img", "a"]):
                          raw = node.get("src") or node.get("href")
                          if not raw:
                              continue
                          absolute = urljoin(str(response.url), str(raw))
                          if "img.php" in absolute or re.search(r"\.(?:jpe?g|png|webp)(?:\?|$)", absolute, re.I):
                              imgs.append(absolute)
                      sample[view] = {
                          "status": response.status_code,
                          "bytes": len(response.content),
                          "title": clean(soup.title.get_text(" ", strip=True) if soup.title else "")[:220],
                          "text_sample": text[:1400],
                          "expose_links": [link for link in links if "expose.php" in link][:20],
                          "image_links": list(dict.fromkeys(imgs))[:40],
                      }
                  report["active_sample"] = sample

          report["total_unique"] = len({item["id"] for item in all_items})
          report["total_sold"] = sum(1 for item in all_items if item["sold"])
          report["total_active"] = report["total_unique"] - report["total_sold"]
          print("SUMMARY", json.dumps({k: report[k] for k in ("total_unique", "total_sold", "total_active")}, ensure_ascii=False))
          from pathlib import Path
          Path("ci").mkdir(exist_ok=True)
          Path("ci/latest_peisser_probe.json").write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/hauscheck-peisser-probe.log
          exit "$CODE"
      - name: Commit probe result
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_peisser_probe.json
          git commit -m "Update Peisser live probe [skip ci]" || true
          git push || true
