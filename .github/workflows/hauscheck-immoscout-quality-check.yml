name: HausCheck ImmobilienScout Quality Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/immoscout_support.py"
      - "hauscheck/app/immoscout_quality.py"
      - "hauscheck/app/bootstrap.py"
      - "hauscheck/config.yaml"
      - ".github/workflows/hauscheck-immoscout-quality-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Run live portal and duplicate quality checks
        id: check
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-immoscout-quality
          mkdir -p /tmp/hauscheck-immoscout-quality
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-immoscout-quality python - <<'PY' > /tmp/hauscheck-immoscout-quality.log 2>&1
          import asyncio
          import io

          import httpx
          from PIL import Image

          import app.bootstrap
          import app.immoscout_quality as quality
          import app.immoscout_support as support
          import app.main as main
          from app.parser import ParsedListing
          from app.storage import create_house, create_search_profile, list_search_candidates

          SEARCH_URL = "https://www.immobilienscout24.at/regional/8551/haus-kaufen?plotAreaFrom=700&primaryAreaFrom=120&primaryPriceTo=420000"
          EXPOSE_URL = "https://www.immobilienscout24.at/expose/69dcb82ff88781c17db2b90a"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126.0 Safari/537.36",
              "Accept-Language": "de-AT,de;q=0.9,en;q=0.7",
          }
          expose_response = httpx.get(EXPOSE_URL, headers=headers, timeout=45, follow_redirects=True)
          expose_response.raise_for_status()
          parsed = support.parse_immoscout(EXPOSE_URL, expose_response.text)
          assert parsed.price_eur == 320000
          assert parsed.living_area_m2 == 275
          assert parsed.plot_area_m2 == 2000
          assert parsed.rooms == 6
          assert parsed.energy_hwb == 352
          assert parsed.heating and "gas" in parsed.heating.lower()
          assert len(parsed.image_urls) == 3
          print("live_detail_parser=ok")

          image_response = httpx.get(
              parsed.image_urls[0],
              headers={"User-Agent": main.USER_AGENT, "Referer": "https://www.immobilienscout24.at/"},
              timeout=45,
              follow_redirects=True,
          )
          image_response.raise_for_status()
          with Image.open(io.BytesIO(image_response.content)) as image:
              assert image.width >= 600 and image.height >= 400, image.size
          print(f"live_gallery_download={image.width}x{image.height}")

          profile = create_search_profile({
              "name": "Live ImmoScout Suche",
              "source_name": "immobilienscout24.at",
              "search_url": SEARCH_URL,
              "max_price_eur": 420000,
              "min_living_area_m2": 120,
              "min_plot_area_m2": 700,
          })
          found = asyncio.run(main.run_search_profile(str(profile["id"]), 20))
          candidates = list_search_candidates(str(profile["id"]))
          target = next(item for item in candidates if support.external_id_for_url(str(item.get("source_url"))) == "69dcb82ff88781c17db2b90a")
          assert found >= 2, found
          assert target["price_eur"] == 320000, target
          assert target["living_area_m2"] == 275, target
          assert target["plot_area_m2"] == 2000, target
          assert target["energy_hwb"] == 352, target
          assert target["preview_image_url"], target
          print(f"full_search_persisted={found}")

          strong_house = create_house({
              "title": parsed.title,
              "location_text": parsed.location_text,
              "address_status": parsed.address_status,
              "living_area_m2": parsed.living_area_m2,
              "plot_area_m2": parsed.plot_area_m2,
              "rooms": parsed.rooms,
              "heating": parsed.heating,
              "energy_hwb": parsed.energy_hwb,
          })
          score, reasons = quality.structured_match_conservative(strong_house, parsed)
          assert score >= 9, (score, reasons)
          assert "gleicher HWB" in reasons and "gleiche Heizungsart" in reasons
          print("high_confidence_structured_duplicate=ok")

          weak_house = create_house({
              "title": "Großzügiges Familienhaus in Wies",
              "location_text": "8551 Wies",
              "address_status": "municipality_only",
              "living_area_m2": 275,
              "plot_area_m2": 2000,
              "rooms": 6,
              "heating": "Wärmepumpe",
              "energy_hwb": 55,
          })
          weak_parsed = ParsedListing(
              source_name="immobilienscout24.at",
              source_url="https://www.immobilienscout24.at/expose/other-house",
              external_id="other-house",
              title="Großzügiges Familienhaus in Wies",
              location_text="8551 Wies",
              address_status="municipality_only",
              living_area_m2=275,
              plot_area_m2=2000,
              rooms=6,
              heating="Gas",
              energy_hwb=352,
          )
          weak_score, weak_reasons = quality.structured_match_conservative(weak_house, weak_parsed)
          assert weak_score < 9, (weak_score, weak_reasons)
          original_remote = support._remote_image_hashes
          support._remote_image_hashes = lambda urls, limit=5: asyncio.sleep(0, result=[])
          try:
              match, method, confidence, details = asyncio.run(quality.find_probable_duplicate_conservative(weak_parsed))
          finally:
              support._remote_image_hashes = original_remote
          assert not (match and match.get("id") == weak_house.get("id")), (match, method, confidence, details)
          print("similar_size_but_different_energy_not_merged=ok")

          exact_a = support._dhash(image_response.content)
          recompressed = io.BytesIO()
          with Image.open(io.BytesIO(image_response.content)) as image:
              image.convert("RGB").save(recompressed, "JPEG", quality=45)
          exact_b = support._dhash(recompressed.getvalue())
          assert support._hash_distance(exact_a, exact_b) <= 6, (exact_a, exact_b)
          print("live_photo_recompression_match=ok")
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/hauscheck-immoscout-quality.log
          exit "$CODE"
      - name: Publish result
        if: always()
        env:
          TEST_STATUS: ${{ steps.check.outputs.status }}
          TEST_CODE: ${{ steps.check.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          path = Path('/tmp/hauscheck-immoscout-quality.log')
          Path('ci/latest_immoscout_quality_check.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': path.read_text(encoding='utf-8', errors='replace')[-8000:] if path.exists() else '',
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_immoscout_quality_check.json
          git commit -m "Update ImmobilienScout quality check [skip ci]" || true
          git push || true
