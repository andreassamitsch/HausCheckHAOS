name: HausCheck Nonblocking Startup Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/media_startup_fix.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-nonblocking-startup-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Verify startup remains responsive
        shell: bash
        env:
          HAUSCHECK_DATA_DIR: /tmp/hauscheck-startup
          HAUSCHECK_GITHUB_EXCHANGE_ENABLED: "false"
          HAUSCHECK_GMAIL_EXCHANGE_ENABLED: "false"
        run: |
          set +e
          rm -rf /tmp/hauscheck-startup
          mkdir -p /tmp/hauscheck-startup
          cd hauscheck
          python - <<'PY' > /tmp/startup-check.log 2>&1
          import time
          from pathlib import Path

          from PIL import Image, ImageDraw

          from app.storage import (
              add_media,
              create_house,
              create_source,
              init_storage,
              project_dir,
              update_media,
          )

          init_storage()
          house = create_house({"title": "Große bestehende Galerie", "location_text": "8551 Wies"})
          house_id = str(house["id"])
          source_a = create_source(house_id, {"source_name": "Makler A", "source_url": "https://example.test/a"})
          source_b = create_source(house_id, {"source_name": "Makler B", "source_url": "https://example.test/b"})
          image_dir = project_dir(house_id) / "images"

          for index in range(70):
              image = Image.new("RGB", (1000, 720), (80 + index % 120, 120, 150))
              draw = ImageDraw.Draw(image)
              draw.rectangle((80 + index, 100, 650, 600), outline=(20, 20, 20), width=8)
              draw.text((30, 30), f"Bild {index}", fill="white")
              path = image_dir / f"existing_{index:03d}.jpg"
              image.save(path, "JPEG", quality=88)
              source = source_a if index < 35 else source_b
              media = add_media(house_id, {
                  "source_id": source["id"],
                  "kind": "image",
                  "original_url": f"https://example.test/{index}.jpg",
                  "download_status": "pending",
                  "source_order": index % 35,
              })
              update_media(str(media["id"]), {
                  "local_path": str(path),
                  "mime_type": "image/jpeg",
                  "download_status": "downloaded",
                  "file_size_bytes": path.stat().st_size,
                  "width": 1000,
                  "height": 720,
              })

          started = time.monotonic()
          import app.bootstrap
          elapsed = time.monotonic() - started
          print(f"bootstrap_seconds={elapsed:.3f}")
          assert elapsed < 8.0, elapsed

          from fastapi.testclient import TestClient
          with TestClient(app.bootstrap.app) as client:
              response = client.get("/")
              print(f"root_status={response.status_code}")
              assert response.status_code == 200

          import app.media_quality_v2 as media_quality
          summary = media_quality.cleanup_all_houses()
          print(f"startup_cleanup_summary={summary}")
          assert summary.get("deferred") is True, summary
          print("nonblocking_media_startup=ok")
          PY
          CODE=$?
          cat /tmp/startup-check.log
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          Path('../ci').mkdir(exist_ok=True)
          log = Path('/tmp/startup-check.log').read_text(encoding='utf-8', errors='replace')
          Path('../ci/latest_nonblocking_startup_check.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'status': 'success' if 'nonblocking_media_startup=ok' in log else 'failed',
              'log_tail': log[-5000:],
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          cd ..
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ci/latest_nonblocking_startup_check.json
          git commit -m "Update nonblocking startup check [skip ci]" || true
          git pull --rebase origin main || true
          git push || true
          exit "$CODE"
