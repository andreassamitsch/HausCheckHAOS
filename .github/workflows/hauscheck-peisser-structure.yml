name: HausCheck Peisser Structure Probe

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/hauscheck-peisser-structure.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install httpx beautifulsoup4
      - name: Inspect overview hierarchy
        run: |
          python - <<'PY'
          import json, re
          from urllib.parse import urljoin, urlsplit, parse_qs
          import httpx
          from bs4 import BeautifulSoup
          headers={"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126.0 Safari/537.36","Accept-Language":"de-AT,de;q=0.9"}
          def clean(v): return re.sub(r"\s+"," ",str(v or "")).strip()
          report={}
          with httpx.Client(timeout=45,follow_redirects=True,headers=headers) as client:
            for page in (1,4):
              url=f"https://www.peisser-immobilien.at/index.php?page={page}&view=index&mode=entry&lang=de"
              soup=BeautifulSoup(client.get(url).text,"html.parser")
              entries=[]; seen=set()
              for a in soup.find_all("a",href=True):
                absolute=urljoin(url,str(a.get("href") or "")); parts=urlsplit(absolute)
                eid=(parse_qs(parts.query).get("id") or [None])[0] if parts.path.endswith("expose.php") else None
                if not eid or eid in seen: continue
                seen.add(eid)
                chain=[]; node=a
                for level in range(8):
                  if node is None: break
                  chain.append({
                    "level":level,
                    "tag":getattr(node,"name",None),
                    "id":node.get("id") if hasattr(node,"get") else None,
                    "class":node.get("class") if hasattr(node,"get") else None,
                    "text":clean(node.get_text(" ",strip=True))[:700] if hasattr(node,"get_text") else "",
                    "html_start":str(node)[:500],
                  })
                  node=getattr(node,"parent",None)
                prev=[]
                node=a
                for _ in range(5):
                  node=node.find_previous() if node else None
                  if not node: break
                  text=clean(node.get_text(" ",strip=True))
                  if text: prev.append({"tag":node.name,"class":node.get("class"),"text":text[:300]})
                entries.append({"id":eid,"anchor_text":clean(a.get_text(" ",strip=True)),"chain":chain,"previous":prev})
                if len(entries)>=4: break
              report[str(page)]=entries
          from pathlib import Path
          Path("ci").mkdir(exist_ok=True)
          Path("ci/latest_peisser_structure.json").write_text(json.dumps(report,ensure_ascii=False,indent=2),encoding="utf-8")
          PY
      - name: Commit structure result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_peisser_structure.json
          git commit -m "Update Peisser structure probe [skip ci]" || true
          git push || true
