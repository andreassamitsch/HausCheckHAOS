name: HausCheck Peisser Scan Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/peisser_support.py"
      - "hauscheck/app/peisser_support_fix.py"
      - ".github/workflows/hauscheck-peisser-scan-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Scan pages 1 to 10 with production parser
        id: test
        shell: bash
        run: |
          set +e
          cd hauscheck
          python - <<'PY' > /tmp/hauscheck-peisser-scan.log 2>&1
          import asyncio
          import httpx
          import app.peisser_support as peisser

          async def run():
              signatures=[]
              sold=0
              active=0
              stopped_at=None
              async with httpx.AsyncClient(timeout=45,follow_redirects=True,headers=peisser.BROWSER_HEADERS) as client:
                  for page in range(1, peisser.PEISSER_MAX_PAGES + 1):
                      url=f"{peisser.PEISSER_BASE}index.php?page={page}&view=index&mode=entry&lang=de"
                      response=await client.get(url)
                      response.raise_for_status()
                      cards=peisser.parse_peisser_overview(response.text,str(response.url))
                      signature=tuple(sorted(card['entry_id'] for card in cards))
                      duplicate=signature in signatures
                      print(f"page={page} cards={len(cards)} sold={sum(1 for card in cards if card['sold'])} duplicate={duplicate}")
                      if not cards or duplicate:
                          stopped_at=page
                          break
                      signatures.append(signature)
                      sold += sum(1 for card in cards if card['sold'])
                      active += sum(1 for card in cards if not card['sold'])
              assert stopped_at == 5, stopped_at
              assert len(signatures) == 4, signatures
              assert sold > 0 and active > 0, (sold,active)
              assert all(card['sold'] is False for card in [item for item in peisser.parse_peisser_overview((await client_page()).text, peisser.PEISSER_SEARCH_URL) if not item['sold']])
              print(f"scan_stop=ok pages=4 sold={sold} active={active}")

          async def client_page():
              async with httpx.AsyncClient(timeout=45,follow_redirects=True,headers=peisser.BROWSER_HEADERS) as client:
                  return await client.get(peisser.PEISSER_SEARCH_URL)

          asyncio.run(run())
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/hauscheck-peisser-scan.log
          exit "$CODE"
      - name: Publish result
        if: always()
        env:
          TEST_STATUS: ${{ steps.test.outputs.status }}
          TEST_CODE: ${{ steps.test.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          p=Path('/tmp/hauscheck-peisser-scan.log')
          log=p.read_text(encoding='utf-8',errors='replace') if p.exists() else ''
          Path('ci/latest_peisser_scan_check.json').write_text(json.dumps({
            'created_at':datetime.now(timezone.utc).isoformat(),'commit':os.environ['GITHUB_SHA'],
            'run_id':int(os.environ['GITHUB_RUN_ID']),'status':os.environ.get('TEST_STATUS') or 'failed',
            'test_code':int(os.environ.get('TEST_CODE') or -1),'log_tail':log[-5000:]
          },ensure_ascii=False,indent=2),encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_peisser_scan_check.json
          git commit -m "Update Peisser scan check [skip ci]" || true
          git push || true
