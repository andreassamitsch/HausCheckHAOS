name: HausCheck ImmobilienScout Live Probe

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/hauscheck-immoscout-live-probe.yml"
      - "hauscheck/app/immoscout_support.py"
      - "hauscheck/app/parser.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install probe dependencies
        run: python -m pip install requests beautifulsoup4
      - name: Probe current search and expose HTML
        shell: bash
        run: |
          set +e
          python - <<'PY' > /tmp/hauscheck-immoscout-probe.log 2>&1
          import json
          import re
          from collections import Counter
          from pathlib import Path
          from urllib.parse import urljoin, urlsplit

          import requests
          from bs4 import BeautifulSoup

          URLS = {
              "search": "https://www.immobilienscout24.at/regional/8551/haus-kaufen?plotAreaFrom=700&primaryAreaFrom=120&primaryPriceTo=420000",
              "expose": "https://www.immobilienscout24.at/expose/69dcb82ff88781c17db2b90a",
          }
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36",
              "Accept-Language": "de-AT,de;q=0.9,en;q=0.7",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
          }

          def compact(value, limit=500):
              text = re.sub(r"\s+", " ", str(value or "")).strip()
              return text[:limit]

          def walk_json(value, path="$", out=None):
              if out is None:
                  out = []
              if len(out) >= 700:
                  return out
              if isinstance(value, dict):
                  for key, child in value.items():
                      key_text = str(key)
                      lower = key_text.lower()
                      if any(token in lower for token in (
                          "price", "area", "living", "plot", "room", "year", "build", "hwb", "fgee",
                          "energy", "heating", "address", "location", "title", "description", "image", "gallery",
                          "expose", "property", "estate", "object", "id", "url"
                      )):
                          scalar = child if isinstance(child, (str, int, float, bool)) or child is None else type(child).__name__
                          out.append({"path": f"{path}.{key_text}", "value": compact(scalar, 260)})
                      walk_json(child, f"{path}.{key_text}", out)
              elif isinstance(value, list):
                  for index, child in enumerate(value[:80]):
                      walk_json(child, f"{path}[{index}]", out)
              return out

          result = {}
          for label, url in URLS.items():
              item = {"requested_url": url}
              try:
                  response = requests.get(url, headers=headers, timeout=45, allow_redirects=True)
                  html = response.text
                  soup = BeautifulSoup(html, "html.parser")
                  item.update({
                      "status_code": response.status_code,
                      "final_url": response.url,
                      "content_type": response.headers.get("content-type"),
                      "content_length": len(response.content),
                      "title": compact(soup.title.get_text(" ", strip=True) if soup.title else ""),
                      "challenge_markers": [m for m in ["captcha", "access denied", "cloudflare", "datadome", "incapsula", "bot detection"] if m in html.lower()],
                  })

                  metas = {}
                  for meta in soup.find_all("meta"):
                      key = meta.get("property") or meta.get("name")
                      value = meta.get("content")
                      if key and value and any(token in str(key).lower() for token in ("title", "description", "image", "url", "price")):
                          metas[str(key)] = compact(value)
                  item["meta"] = metas

                  expose_links = []
                  for tag in soup.find_all("a", href=True):
                      href = urljoin(response.url, str(tag.get("href")))
                      if re.search(r"/expose/[A-Za-z0-9_-]+", href):
                          expose_links.append(urlsplit(href)._replace(query="", fragment="").geturl())
                  expose_links += re.findall(r"https?://(?:www\.)?immobilienscout24\.at/expose/[A-Za-z0-9_-]+", html, re.I)
                  item["expose_links"] = list(dict.fromkeys(expose_links))[:100]

                  image_urls = re.findall(r"https?://[^\"'\\\s<>]+?(?:\.jpg|\.jpeg|\.png|\.webp)(?:\?[^\"'\\\s<>]*)?", html, re.I)
                  normalized_images = []
                  for image in image_urls:
                      image = image.replace("\\/", "/").replace("&amp;", "&")
                      if image not in normalized_images:
                          normalized_images.append(image)
                  item["image_count"] = len(normalized_images)
                  item["image_hosts"] = Counter(urlsplit(x).netloc for x in normalized_images).most_common(12)
                  item["image_samples"] = normalized_images[:20]

                  json_payloads = []
                  script_summaries = []
                  for index, script in enumerate(soup.find_all("script")):
                      raw = script.string or script.get_text() or ""
                      if not raw.strip():
                          continue
                      stype = str(script.get("type") or "")
                      sid = str(script.get("id") or "")
                      if stype in {"application/ld+json", "application/json"} or sid == "__NEXT_DATA__":
                          try:
                              payload = json.loads(raw)
                              entries = walk_json(payload)
                              json_payloads.append({"index": index, "type": stype, "id": sid, "top_type": type(payload).__name__, "interesting": entries[:250]})
                          except Exception as exc:
                              script_summaries.append({"index": index, "type": stype, "id": sid, "json_error": compact(exc), "sample": compact(raw, 300)})
                      elif any(marker in raw for marker in ("HWB", "fGEE", "Kaufpreis", "Wohnfläche", "Grundstück", "gallery", "images", "exposeId", "propertyId")):
                          script_summaries.append({"index": index, "type": stype, "id": sid, "sample": compact(raw, 900)})
                  item["json_payloads"] = json_payloads[:30]
                  item["script_summaries"] = script_summaries[:30]

                  text = compact(soup.get_text(" ", strip=True), 120000)
                  snippets = {}
                  for key, pattern in {
                      "price": r".{0,100}(?:Kaufpreis|Preis).{0,140}",
                      "living": r".{0,100}(?:Wohnfläche|Wohnnutzfläche).{0,140}",
                      "plot": r".{0,100}(?:Grundstücksfläche|Grundfläche|Grundstück).{0,140}",
                      "rooms": r".{0,100}Zimmer.{0,140}",
                      "year": r".{0,100}Baujahr.{0,140}",
                      "hwb": r".{0,120}HWB.{0,180}",
                      "fgee": r".{0,120}f\s*GEE.{0,180}",
                      "heating": r".{0,100}(?:Heizung|Heizungsart).{0,160}",
                  }.items():
                      match = re.search(pattern, text, re.I)
                      snippets[key] = compact(match.group(0), 380) if match else None
                  item["text_snippets"] = snippets
              except Exception as exc:
                  item["error"] = compact(exc, 800)
              result[label] = item

          Path("ci").mkdir(exist_ok=True)
          Path("ci/latest_immoscout_live_probe.json").write_text(json.dumps(result, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(result, ensure_ascii=False, indent=2)[:30000])
          PY
          CODE=$?
          cat /tmp/hauscheck-immoscout-probe.log
          exit "$CODE"
      - name: Publish probe result
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_immoscout_live_probe.json
          git commit -m "Update ImmobilienScout live probe [skip ci]" || true
          git push || true
