name: HausCheck Expose Review Check

on:
  push:
    branches:
      - main
    paths:
      - "hauscheck/app/expose_review.py"
      - "hauscheck/app/expose_address_quality.py"
      - "hauscheck/app/house_manage.py"
      - "hauscheck/app/product_ui.py"
      - "hauscheck/app/mobile_first_ui.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-expose-review-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt

      - name: Test expose documents and reviewed address update
        id: expose_check
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-expose-test
          mkdir -p /tmp/hauscheck-expose-test
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-expose-test python - <<'PY' > /tmp/hauscheck-expose-check.log 2>&1
          from fastapi.testclient import TestClient

          import app.bootstrap
          from app.expose_review import extract_address_proposals, store_address_proposals
          from app.storage import add_media, create_house, get_house, project_dir

          house = create_house({
              "title": "Exposé Testhaus",
              "location_text": "8551 Wies",
              "address_status": "municipality_only",
          })
          house_id = str(house["id"])

          text = """
          Objektadresse:
          Kowaldstraße 2
          8551 Wies

          Kontakt Makler GmbH
          Hauptstraße 9
          8010 Graz
          """
          proposals = extract_address_proposals(text)
          assert len(proposals) == 1, proposals
          assert proposals[0]["address_text"] == "Kowaldstraße 2, 8551 Wies", proposals
          assert proposals[0]["confidence"] == "high", proposals
          print("object_address_without_broker_address=ok")

          rural = """
          Liegenschaftsadresse: Hörmsdorf 12, 8552 Eibiswald
          Kontakt: Muster Immobilien GmbH, Hauptstraße 9, 8010 Graz
          """
          rural_proposals = extract_address_proposals(rural)
          assert len(rural_proposals) == 1, rural_proposals
          assert rural_proposals[0]["address_text"] == "Hörmsdorf 12, 8552 Eibiswald", rural_proposals
          assert rural_proposals[0]["confidence"] == "high", rural_proposals
          print("rural_austrian_address_without_broker_address=ok")

          postcode_first = """
          Adresse des Objekts: 8552 Eibiswald, Hörmsdorf 12
          Anbieter Immobilien GmbH, 8010 Graz
          """
          postcode_proposals = extract_address_proposals(postcode_first)
          assert len(postcode_proposals) == 1, postcode_proposals
          assert postcode_proposals[0]["address_text"] == "Hörmsdorf 12, 8552 Eibiswald", postcode_proposals
          print("postcode_first_object_address=ok")

          pdf_path = project_dir(house_id) / "pdfs" / "test_expose.pdf"
          pdf_path.write_bytes(b"%PDF-1.4\n% HausCheck regression fixture\n")
          pdf = add_media(house_id, {
              "kind": "pdf",
              "local_path": str(pdf_path),
              "mime_type": "application/pdf",
              "download_status": "downloaded",
              "file_size_bytes": pdf_path.stat().st_size,
          })
          stored = store_address_proposals(house_id, str(pdf["id"]), proposals)
          assert len(stored) == 1, stored
          proposal_id = str(stored[0]["id"])

          with TestClient(app.bootstrap.app) as client:
              detail = client.get(f"/houses/{house_id}")
              assert detail.status_code == 200
              assert "hc-expose-review-v1" in detail.text
              assert "test_expose.pdf" in detail.text
              assert "PDF öffnen" in detail.text
              assert "Erneut auslesen" in detail.text
              assert "Kowaldstraße 2, 8551 Wies" in detail.text
              assert "Adresse übernehmen" in detail.text
              assert f"{house_id}/address-proposals/{proposal_id}/accept" in detail.text
              print("expose_pdf_visible_and_address_review=ok")

              pdf_response = client.get(f"/media/{pdf['id']}")
              assert pdf_response.status_code == 200
              assert pdf_response.content.startswith(b"%PDF")
              print("expose_pdf_download=ok")

              accepted = client.post(
                  f"/houses/{house_id}/address-proposals/{proposal_id}/accept",
                  follow_redirects=False,
              )
              assert accepted.status_code == 303, accepted.text
              updated = get_house(house_id)
              assert updated["location_text"] == "Kowaldstraße 2, 8551 Wies", updated
              assert updated["exact_address"] == "Kowaldstraße 2, 8551 Wies", updated
              assert updated["address_status"] == "exact", updated
              print("approved_address_written_to_house=ok")

              detail_after = client.get(f"/houses/{house_id}")
              assert detail_after.status_code == 200
              assert "übernommen" in detail_after.text
              print("address_decision_history=ok")
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/hauscheck-expose-check.log
          exit "$CODE"

      - name: Publish expose review result
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.expose_check.outputs.status }}
          TEST_CODE: ${{ steps.expose_check.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log_path = Path('/tmp/hauscheck-expose-check.log')
          log = log_path.read_text(encoding='utf-8', errors='replace') if log_path.exists() else ''
          result = {
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': log[-6000:],
          }
          Path('ci/latest_expose_review_check.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_expose_review_check.json
          git commit -m "Update HausCheck expose review check [skip ci]" || true
          git push || true
