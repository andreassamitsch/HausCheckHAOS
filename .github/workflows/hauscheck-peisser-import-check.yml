name: HausCheck Peisser Import Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/peisser_support.py"
      - "hauscheck/app/peisser_support_fix.py"
      - "hauscheck/app/peisser_dedupe_fix.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-peisser-import-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt
      - name: Test profile, new import and sold rejection
        id: test
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-peisser-import
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-peisser-import python - <<'PY' > /tmp/hauscheck-peisser-import.log 2>&1
          import asyncio
          import httpx
          from fastapi import HTTPException
          from fastapi.testclient import TestClient

          import app.bootstrap
          import app.github_auto_export as github_export
          import app.gmail_exchange as gmail_exchange
          import app.import_patch as import_patch
          import app.main as main
          import app.peisser_support as peisser
          from app.storage import list_houses, list_media, list_search_profiles, list_sources

          with TestClient(app.bootstrap.app) as client:
              response = client.post('/settings/search/profiles', data={
                  'name':'Peisser Profiltest','source_name':peisser.PEISSER_SOURCE,'regions':'Wies, Bad Schwanberg',
                  'area_ids':'8551,8541','search_url':'','max_price_eur':'420000','soft_max_price_eur':'390000',
                  'min_living_area_m2':'120','min_plot_area_m2':'700','exclude_roads':'B76,B69',
                  'hwb_warn':'200','hwb_reject':'300','oil_policy':'review','automation_mode':'review',
                  'run_interval_minutes':'60','max_results':'40','auto_import_min_score':'68','auto_import_limit_per_run':'2',
              }, follow_redirects=False)
              assert response.status_code == 303, response.text
              profile = next(item for item in list_search_profiles() if item['name']=='Peisser Profiltest')
              assert profile['source_name'] == peisser.PEISSER_SOURCE, profile
              assert profile['search_url'] == peisser.PEISSER_SEARCH_URL, profile
              assert profile['search_url_mode'] == 'automatic', profile
              assert profile['area_ids'] == '8551,8541', profile
              print('profile_creation=ok')

          async def run():
              async def no_media(house_id, limit=120): return None
              async def fake_export(house_id): return {'ok':True}
              async def fake_gmail(house_id): return {'ok':True}
              main.download_pending_media_files = no_media
              github_export.auto_export_house_to_github = fake_export
              gmail_exchange.send_analysis_zip_via_gmail = fake_gmail

              result = await import_patch.import_listing_to_pipeline(f'{peisser.PEISSER_BASE}expose.php?id=229')
              assert result['created'] is True, result
              house = result['house']
              assert house['price_eur'] == 195000, house
              assert float(house['living_area_m2']) == 130.0, house
              assert float(house['plot_area_m2']) == 10893.0, house
              assert float(house['energy_hwb']) == 73.0, house
              sources = list_sources(str(house['id']))
              media = list_media(str(house['id']))
              assert len(list_houses()) == 1
              assert len(sources) == 1 and sources[0]['source_name'] == peisser.PEISSER_SOURCE, sources
              assert len([item for item in media if item.get('kind') == 'image']) >= 15, len(media)
              assert all('/data/229/img_' in str(item.get('original_url') or '') for item in media if item.get('kind') == 'image')
              print(f"new_house_import=ok images_queued={len(media)}")

              async with httpx.AsyncClient(timeout=45, follow_redirects=True, headers=peisser.BROWSER_HEADERS) as client:
                  page = await client.get(f'{peisser.PEISSER_BASE}index.php?page=1&view=index&mode=entry&lang=de')
                  page.raise_for_status()
              sold = next(item for item in peisser.parse_peisser_overview(page.text, str(page.url)) if item['sold'])
              try:
                  await import_patch.import_listing_to_pipeline(sold['url'])
              except HTTPException as exc:
                  assert exc.status_code == 409, exc
                  print(f"sold_direct_import_rejected=ok id={sold['entry_id']}")
              else:
                  raise AssertionError('VERKAUFT-Inserat wurde importiert')
              assert len(list_houses()) == 1

          asyncio.run(run())
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/hauscheck-peisser-import.log
          exit "$CODE"
      - name: Publish result
        if: always()
        env:
          TEST_STATUS: ${{ steps.test.outputs.status }}
          TEST_CODE: ${{ steps.test.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          p=Path('/tmp/hauscheck-peisser-import.log')
          log=p.read_text(encoding='utf-8',errors='replace') if p.exists() else ''
          Path('ci/latest_peisser_import_check.json').write_text(json.dumps({
            'created_at':datetime.now(timezone.utc).isoformat(),'commit':os.environ['GITHUB_SHA'],
            'run_id':int(os.environ['GITHUB_RUN_ID']),'status':os.environ.get('TEST_STATUS') or 'failed',
            'test_code':int(os.environ.get('TEST_CODE') or -1),'log_tail':log[-8000:]
          },ensure_ascii=False,indent=2),encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_peisser_import_check.json
          git commit -m "Update Peisser import check [skip ci]" || true
          git push || true
