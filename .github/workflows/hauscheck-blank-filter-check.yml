name: HausCheck Blank Filter Check

on:
  push:
    branches:
      - main
    paths:
      - "hauscheck/app/blank_query_fix.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-blank-filter-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt

      - name: Test empty and filled numeric filters
        id: filter_test
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-filter-test
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-filter-test python - <<'PY' > /tmp/hauscheck-filter-check.log 2>&1
          from fastapi.testclient import TestClient
          import app.bootstrap

          with TestClient(app.bootstrap.app) as client:
              response = client.get('/?sort=score_desc&q=&min_score=&max_price=&max_hwb=')
              assert response.status_code == 200, (response.status_code, response.text[:1000])
              assert 'Hausakten' in response.text
              print('blank_numeric_filters=ok')

              response = client.get('/?sort=score_desc&min_score=70&max_price=380000&max_hwb=150.5')
              assert response.status_code == 200, (response.status_code, response.text[:1000])
              print('valid_numeric_filters=ok')
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/hauscheck-filter-check.log
          exit "$CODE"

      - name: Publish result
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.filter_test.outputs.status }}
          TEST_CODE: ${{ steps.filter_test.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path('/tmp/hauscheck-filter-check.log')
          log = path.read_text(encoding='utf-8', errors='replace') if path.exists() else ''
          result = {
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': log[-4000:],
          }
          Path('ci/latest_blank_filter_check.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_blank_filter_check.json
          git commit -m "Update HausCheck blank filter check [skip ci]" || true
          git push || true
