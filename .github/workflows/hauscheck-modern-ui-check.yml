name: HausCheck Modern UI Check

on:
  push:
    branches:
      - main
    paths:
      - "hauscheck/app/modern_ui.py"
      - "hauscheck/app/modern_ui_fix.py"
      - "hauscheck/app/mobile_layout_state_fix.py"
      - "hauscheck/app/live_filter_pan.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-modern-ui-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: hauscheck
        run: python -m pip install -r requirements.txt

      - name: Validate modern UI, profile editing and refresh
        id: modern_test
        shell: bash
        run: |
          set +e
          rm -rf /tmp/hauscheck-modern-test
          cd hauscheck
          HAUSCHECK_DATA_DIR=/tmp/hauscheck-modern-test python - <<'PY' > /tmp/hauscheck-modern-check.log 2>&1
          from pathlib import Path

          from PIL import Image
          from fastapi.testclient import TestClient

          import app.bootstrap
          import app.modern_ui as modern_ui
          from app.parser import ParsedListing
          from app.storage import (
              add_media,
              create_house,
              create_search_profile,
              create_source,
              get_house,
              get_search_profile,
              project_dir,
              upsert_search_candidate,
          )

          application = app.bootstrap.app

          main_house = create_house({
              "title": "Modernes Testhaus",
              "location_text": "8551 Wies",
              "price_eur": 390000,
              "living_area_m2": 140,
              "plot_area_m2": 900,
          })
          second_house = create_house({
              "title": "Zweiter Makler",
              "location_text": "8551 Wies",
              "price_eur": 385000,
          })
          main_id = str(main_house["id"])
          second_id = str(second_house["id"])

          source = create_source(main_id, {
              "source_name": "Makler Test",
              "source_url": "https://example.test/modern-house",
              "external_id": "MODERN-1",
              "description": "Altes Inserat",
          })
          image_path = project_dir(main_id) / "images" / "cover.jpg"
          Image.new("RGB", (1000, 700), (170, 180, 190)).save(image_path, "JPEG")
          media = add_media(main_id, {
              "source_id": source["id"],
              "kind": "image",
              "original_url": "https://img.test/cover.jpg",
              "local_path": str(image_path),
              "mime_type": "image/jpeg",
              "download_status": "downloaded",
              "content_hash": "modern-cover",
              "width": 1000,
              "height": 700,
              "file_size_bytes": image_path.stat().st_size,
          })

          profile = create_search_profile({
              "name": "Modern Profil",
              "source_name": "willhaben.at",
              "search_url": "https://www.willhaben.at/iad/immobilien/haus-kaufen?areaId=8551",
              "regions": "Wies",
              "max_price_eur": 400000,
              "min_living_area_m2": 120,
          })
          profile_id = str(profile["id"])
          upsert_search_candidate(
              profile_id,
              "https://www.willhaben.at/iad/immobilien/d/test-11223344",
              "Nicht importierter Kandidat",
              status="new",
              facts={"price_eur": 350000, "living_area_m2": 135, "plot_area_m2": 800},
          )

          async def fake_fetch_html(url: str) -> str:
              return "<html><body>aktualisiert</body></html>"

          def fake_parse_listing(url: str, raw_html: str) -> ParsedListing:
              return ParsedListing(
                  source_name="Makler Test",
                  source_url=url,
                  external_id="MODERN-1",
                  title="Modernes Testhaus aktualisiert",
                  description="Neue Beschreibung",
                  price_eur=375000,
                  living_area_m2=142,
                  plot_area_m2=900,
                  rooms=5,
                  location_text="8551 Wies",
                  address_status="municipality_only",
                  year_built=2002,
                  heating="Wärmepumpe",
                  energy_hwb=72.5,
                  image_urls=[],
                  pdf_urls=[],
                  evidence=[{
                      "field_name": "price_eur",
                      "value": 375000,
                      "source_label": "Testpreis",
                      "source_text_snippet": "375.000 Euro",
                      "confidence": "verified",
                  }],
              )

          async def fake_download(house_id: str) -> None:
              return None

          async def fake_export(house_id: str) -> bool:
              return True

          modern_ui.main.fetch_html = fake_fetch_html
          modern_ui.main.parse_listing = fake_parse_listing
          modern_ui.main.download_pending_media_files = fake_download
          modern_ui.auto_export_house_to_github = fake_export

          result = __import__('asyncio').run(modern_ui.refresh_house_from_sources(main_id))
          assert result["analysis_started"] is True, result
          refreshed = get_house(main_id)
          assert refreshed["price_eur"] == 375000, refreshed
          assert refreshed["energy_hwb"] == 72.5, refreshed
          assert refreshed["last_refreshed_at"], refreshed
          print("refresh_house_from_sources=ok")

          with TestClient(application) as client:
              dashboard = client.get("/")
              assert dashboard.status_code == 200
              assert "nicht importierte Suchkandidaten" in dashboard.text
              assert "Modernes Testhaus aktualisiert" in dashboard.text
              assert ">Anwenden</button>" not in dashboard.text
              assert "hc-dashboard-auto-filter-v1" in dashboard.text
              print("modern_dashboard_live_filters=ok")

              detail = client.get(f"/houses/{main_id}")
              assert detail.status_code == 200
              for label in ["Aktualisieren", "Zwei Hausakten zusammenlegen", "Vorschaubild", "Bearbeiten"]:
                  assert label in detail.text, label
              assert "Zuletzt aktualisiert" in detail.text
              assert "hc-lightbox-pan-v1" in detail.text
              print("modern_house_detail_pan_zoom=ok")

              merge_page = client.get(f"/houses/{main_id}/merge")
              assert merge_page.status_code == 200
              assert "Zwei Hausakten zusammenlegen" in merge_page.text
              assert "Zweiter Makler" in merge_page.text
              assert "../../media/" not in merge_page.text or second_id in merge_page.text
              print("modern_merge_page=ok")

              cover_page = client.get(f"/houses/{main_id}/cover")
              assert cover_page.status_code == 200
              assert "Als Vorschaubild wählen" in cover_page.text
              assert f"../../media/{media['id']}" in cover_page.text
              assert f"preview/{media['id']}" in cover_page.text
              print("modern_cover_page=ok")

              edit_page = client.get(f"/settings/search/{profile_id}/edit")
              assert edit_page.status_code == 200
              assert "Suchprofil bearbeiten" in edit_page.text
              response = client.post(
                  f"/settings/search/{profile_id}/edit",
                  data={
                      "name": "Modern Profil geändert",
                      "regions": "Wies, Eibiswald",
                      "area_ids": "8551,8552",
                      "search_url": "https://www.willhaben.at/iad/immobilien/haus-kaufen?areaId=8551",
                      "max_price_eur": "410000",
                      "soft_max_price_eur": "385000",
                      "min_living_area_m2": "125",
                      "min_plot_area_m2": "750",
                      "exclude_roads": "B76,B69",
                      "hwb_warn": "180",
                      "hwb_reject": "280",
                      "oil_policy": "reject",
                      "enabled": "1",
                      "automation_mode": "review",
                      "run_interval_minutes": "45",
                      "max_results": "70",
                      "auto_import_min_score": "72",
                      "auto_import_limit_per_run": "3",
                  },
                  follow_redirects=False,
              )
              assert response.status_code == 303, response.text
              updated_profile = get_search_profile(profile_id)
              assert updated_profile["name"] == "Modern Profil geändert", updated_profile
              assert updated_profile["max_price_eur"] == 410000, updated_profile
              assert updated_profile["regions"] == "Wies, Eibiswald", updated_profile
              assert updated_profile["run_interval_minutes"] == 45, updated_profile
              print("search_profile_full_edit=ok")
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/hauscheck-modern-check.log
          exit "$CODE"

      - name: Publish modern UI result
        if: always()
        shell: bash
        env:
          TEST_STATUS: ${{ steps.modern_test.outputs.status }}
          TEST_CODE: ${{ steps.modern_test.outputs.code }}
        run: |
          mkdir -p ci
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          log_path = Path('/tmp/hauscheck-modern-check.log')
          log = log_path.read_text(encoding='utf-8', errors='replace') if log_path.exists() else ''
          result = {
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ['GITHUB_SHA'],
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'status': os.environ.get('TEST_STATUS') or 'failed',
              'test_code': int(os.environ.get('TEST_CODE') or -1),
              'log_tail': log[-6000:],
          }
          Path('ci/latest_modern_ui_check.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add ci/latest_modern_ui_check.json
          git commit -m "Update HausCheck modern UI check [skip ci]" || true
          git push || true
