name: HausCheck Peisser Final Check

on:
  push:
    branches: [main]
    paths:
      - "hauscheck/app/peisser_runtime_repair.py"
      - "hauscheck/app/peisser_support.py"
      - "hauscheck/app/peisser_dedupe_fix.py"
      - "hauscheck/app/bootstrap.py"
      - ".github/workflows/hauscheck-peisser-final-check.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: hauscheck
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pillow
      - name: Test real Peisser app behavior
        id: check
        env:
          HAUSCHECK_DATA_DIR: /tmp/hauscheck-peisser-final
          HAUSCHECK_GITHUB_EXCHANGE_ENABLED: "false"
          HAUSCHECK_GMAIL_EXCHANGE_ENABLED: "false"
        run: |
          set +e
          rm -rf /tmp/hauscheck-peisser-final
          mkdir -p /tmp/hauscheck-peisser-final
          cd hauscheck
          python - <<'PY' > /tmp/peisser-final.log 2>&1
          import asyncio, json
          from fastapi.testclient import TestClient

          import app.bootstrap
          import app.main as main
          import app.peisser_support as peisser
          import app.immoscout_support as support
          import app.candidate_preimport_dedupe as pre
          from app.storage import (
              create_house, create_source, get_search_profile, list_houses,
              list_search_candidates, list_search_profiles, list_sources,
          )

          client = TestClient(main.app)
          form = client.get('/settings/search/new')
          assert form.status_code == 200
          assert 'peisser-immobilien.at' in form.text

          created = client.post('/settings/search/profiles', data={
              'name': 'Peisser Wies Finaltest', 'source_name': 'peisser-immobilien.at',
              'regions': 'Wies', 'area_ids': '8551', 'search_url': '',
              'max_price_eur': '420000', 'soft_max_price_eur': '380000',
              'min_living_area_m2': '120', 'min_plot_area_m2': '700',
              'hwb_warn': '200', 'hwb_reject': '300', 'oil_policy': 'review',
              'automation_mode': 'review', 'run_interval_minutes': '60',
              'max_results': '80', 'auto_import_min_score': '68',
              'auto_import_limit_per_run': '2',
          }, follow_redirects=False)
          assert created.status_code in (302, 303), created.text[:500]
          profile = list_search_profiles()[0]
          assert profile['source_name'] == peisser.PEISSER_SOURCE, profile
          print('profile_creation=ok')

          house = create_house({
              'title': 'Gute Aussichten – Wohnen, Hobby, Arbeit und Freizeit',
              'location_text': '8551 Wies', 'address_status': 'municipality_only',
              'price_eur': 320000, 'living_area_m2': 275, 'plot_area_m2': 2000,
              'rooms': 6, 'heating': 'Gasheizung', 'energy_hwb': 352,
              'energy_fgee': 4.04,
          })
          house_id = str(house['id'])
          create_source(house_id, {
              'source_name': 'immobilienscout24.at',
              'source_url': 'https://www.immobilienscout24.at/expose/69dcb82ff88781c17db2b90a',
              'external_id': '69dcb82ff88781c17db2b90a',
              'description': 'Ehemalige Portalquelle', 'parser_status': 'success',
              'parser_warnings': [],
          })

          async def no_hashes(urls, limit=5): return []
          async def no_media(house_id, limit=120): return None
          exports = []
          async def fake_export(house_id): exports.append(str(house_id))
          support._remote_image_hashes = no_hashes
          main.download_pending_media_files = no_media
          pre.github_auto_export.auto_export_house_to_github = fake_export
          pre.gmail_exchange.send_analysis_zip_via_gmail = lambda house_id: asyncio.sleep(0)

          # Validate real parser independently before running the UI endpoint.
          raw = asyncio.run(main.fetch_html('https://www.peisser-immobilien.at/expose.php?id=149'))
          parsed = main.parse_listing('https://www.peisser-immobilien.at/expose.php?id=149', raw)
          print('parsed=' + json.dumps({
              'title': parsed.title, 'location': parsed.location_text, 'price': parsed.price_eur,
              'living': parsed.living_area_m2, 'plot': parsed.plot_area_m2, 'rooms': parsed.rooms,
              'heating': parsed.heating, 'hwb': parsed.energy_hwb, 'fgee': parsed.energy_fgee,
              'images': len(parsed.image_urls)
          }, ensure_ascii=False))
          assert support._normalize_text(parsed.heating).find('gas') >= 0, parsed.heating
          direct = asyncio.run(support.find_probable_duplicate(parsed))
          print('direct_match=' + json.dumps({
              'house': (direct[0] or {}).get('id'), 'method': direct[1],
              'score': direct[2], 'details': direct[3]
          }, ensure_ascii=False))
          assert direct[0] and str(direct[0]['id']) == house_id, direct
          assert direct[1] == 'structured_facts', direct

          run = client.post(f"/search/profiles/{profile['id']}/run", follow_redirects=False)
          assert run.status_code in (302, 303), run.text[:500]
          refreshed = get_search_profile(str(profile['id']))
          candidates = list_search_candidates(str(profile['id']))
          target = next((c for c in candidates if c.get('source_url') == 'https://www.peisser-immobilien.at/expose.php?id=149'), None)
          print('last_run=' + json.dumps({
              'status': refreshed.get('last_run_status'), 'error': refreshed.get('last_error'),
              'found': refreshed.get('last_found_count')
          }, ensure_ascii=False))
          print('target=' + json.dumps(target, ensure_ascii=False, default=str))
          assert refreshed.get('last_error') in (None, ''), refreshed
          assert target is not None, candidates
          assert target.get('status') == 'imported', target
          assert str(target.get('imported_house_id')) == house_id, target
          assert target.get('provider') == peisser.PEISSER_SOURCE, target
          sources = list_sources(house_id)
          assert any(s.get('source_name') == peisser.PEISSER_SOURCE for s in sources), sources
          assert len(list_houses()) == 1, list_houses()
          assert exports == [house_id], exports
          print('existing_house_supplemented=ok')

          run2 = client.post(f"/search/profiles/{profile['id']}/run", follow_redirects=False)
          assert run2.status_code in (302, 303)
          assert exports == [house_id], exports
          print('unchanged_second_run_no_reanalysis=ok')
          PY
          CODE=$?
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then echo "status=success" >> "$GITHUB_OUTPUT"; else echo "status=failed" >> "$GITHUB_OUTPUT"; fi
          cat /tmp/peisser-final.log
          exit "$CODE"
      - name: Publish result safely
        if: always()
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          log = Path('/tmp/peisser-final.log').read_text(encoding='utf-8', errors='replace') if Path('/tmp/peisser-final.log').exists() else ''
          Path('/tmp/latest_peisser_final_check.json').write_text(json.dumps({
              'created_at': datetime.now(timezone.utc).isoformat(),
              'commit': os.environ.get('GITHUB_SHA'), 'run_id': os.environ.get('GITHUB_RUN_ID'),
              'status': '${{ steps.check.outputs.status }}', 'test_code': int('${{ steps.check.outputs.code }}' or 1),
              'log_tail': log[-12000:]
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          mkdir -p ci
          cp /tmp/latest_peisser_final_check.json ci/latest_peisser_final_check.json
          git add ci/latest_peisser_final_check.json
          git commit -m "Update Peisser final check [skip ci]" || true
          git push || true
