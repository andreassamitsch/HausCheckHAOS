name: "HausCheck Pro"
version: "0.5.15"
slug: "hauscheck"
description: "Persönlicher Immobilien-Assistent für Home Assistant"
url: "https://github.com/andreassamitsch/HausCheckHAOS"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8088
panel_icon: mdi:home-search
panel_title: HausCheck
ports:
  8088/tcp: null
ports_description:
  8088/tcp: "Optionale direkte API/MCP-Verbindung für ChatGPT-Bridge"
map:
  - share:rw
options:
  log_level: info
  data_dir: /share/hauscheck
  api_token: ""
  github_exchange_enabled: true
  github_auto_export_on_import: true
  github_auto_import_results: true
  github_auto_import_interval_minutes: 5
  github_repo: "andreassamitsch/HausCheckAIExchange"
  github_branch: "main"
  github_token: ""
  github_export_path: "ai_exchange/exports/pending"
  github_result_path: "ai_exchange/results/pending"
  github_done_path: "ai_exchange/results/done"
  github_cleanup_after_import: true
  github_b64_test_path: "ai_exchange/tests/base64"
  github_b64_image_limit: 1
  github_b64_image_max_size: 1800
  github_b64_image_quality: 90
  github_b64_chunk_size: 40000
  github_b64_line_length: 4000
  gmail_exchange_enabled: false
  gmail_auto_send_on_import: true
  gmail_auto_import_results: true
  gmail_import_interval_minutes: 5
  gmail_smtp_host: "smtp.gmail.com"
  gmail_smtp_port: 587
  gmail_imap_host: "imap.gmail.com"
  gmail_imap_port: 993
  gmail_username: ""
  gmail_app_password: ""
  gmail_to: ""
  gmail_from_name: "HausCheck Pro"
  gmail_mark_results_seen: true
  gmail_inline_package: true
  gmail_attach_images: true
  gmail_image_limit: 8
  gmail_send_zip_attachment: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  data_dir: str
  api_token: str
  github_exchange_enabled: bool
  github_auto_export_on_import: bool
  github_auto_import_results: bool
  github_auto_import_interval_minutes: int
  github_repo: str
  github_branch: str
  github_token: password
  github_export_path: str
  github_result_path: str
  github_done_path: str
  github_cleanup_after_import: bool
  github_b64_test_path: str
  github_b64_image_limit: int
  github_b64_image_max_size: int
  github_b64_image_quality: int
  github_b64_chunk_size: int
  github_b64_line_length: int
  gmail_exchange_enabled: bool
  gmail_auto_send_on_import: bool
  gmail_auto_import_results: bool
  gmail_import_interval_minutes: int
  gmail_smtp_host: str
  gmail_smtp_port: int
  gmail_imap_host: str
  gmail_imap_port: int
  gmail_username: str
  gmail_app_password: password
  gmail_to: str
  gmail_from_name: str
  gmail_mark_results_seen: bool
  gmail_inline_package: bool
  gmail_attach_images: bool
  gmail_image_limit: int
  gmail_send_zip_attachment: bool
